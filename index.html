<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ROOT_ACCESS_TERMINAL v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap');
        
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
            overflow-x: hidden;
        }

        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 100;
        }

        .scanline {
            width: 100%; height: 100px; z-index: 101; background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 255, 65, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1; position: absolute; bottom: 100%; animation: scanline 8s linear infinite;
        }

        @keyframes scanline { 0% { bottom: 100%; } 80% { bottom: -100%; } 100% { bottom: -100%; } }

        .retro-border { border: 2px solid #00ff41; box-shadow: 0 0 10px #00ff41; }
        .btn-action { transition: 0.3s; background: #003b00; border: 1px solid #00ff41; }
        .btn-action:hover { background: #00ff41; color: black; box-shadow: 0 0 20px #00ff41; }
        
        textarea { scrollbar-width: thin; scrollbar-color: #00ff41 #000; }
    </style>
</head>
<body class="p-4">
    <div class="crt-overlay"></div>
    <div class="scanline"></div>

    <div class="max-w-6xl mx-auto space-y-4">
        <div class="flex justify-between items-center text-xs border-b border-green-900 pb-2">
            <div>STATUS: <span class="animate-pulse">CONNECTED_TO_OPENROUTER</span></div>
            <div>STABLE_VERSION: 1.0.4</div>
            <div id="clock">00:00:00</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 h-12">
            <input type="password" id="apiKey" placeholder="[ ENTER_API_KEY ]" class="retro-border bg-black px-3 outline-none text-sm text-green-500 placeholder-green-900">
            <input type="text" id="searchCmd" placeholder="[ EXECUTE_ROOT_COMMAND ]" class="md:col-span-2 retro-border bg-black px-3 outline-none text-sm text-yellow-500">
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <div class="lg:col-span-1 space-y-4">
                <div class="retro-border p-3 h-96 overflow-y-auto">
                    <h2 class="text-xs mb-3 border-b border-green-800">SYSTEM_RESTORE_POINTS</h2>
                    <div id="backupList" class="space-y-2">
                        </div>
                </div>
                <button onclick="saveKey()" class="btn-action w-full py-2 text-xs font-bold">SAVE_CONFIG</button>
            </div>

            <div class="lg:col-span-3 relative">
                <div class="absolute top-2 right-4 text-[10px] text-green-900">CODING_INTERFACE_V1</div>
                <textarea id="codeEditor" spellcheck="false" class="w-full h-[500px] bg-black retro-border p-4 font-mono text-sm outline-none leading-relaxed text-green-400"></textarea>
                
                <div class="flex gap-2 mt-4">
                    <button onclick="executeChange()" class="btn-action flex-grow py-3 font-bold uppercase">Inject_Code (Live)</button>
                    <button onclick="testConnection()" class="btn-action px-6 py-3 font-bold uppercase">Test_API</button>
                    <button onclick="location.reload()" class="btn-action px-6 py-3 font-bold uppercase text-red-500 border-red-500">Reset_Sys</button>
                </div>
            </div>
        </div>

        <div class="retro-border p-2 text-[10px] h-20 overflow-y-auto bg-black opacity-70">
            <div id="logs">> System initialized... Waiting for user input.</div>
        </div>
    </div>

    <script>
        let backups = JSON.parse(localStorage.getItem('sys_backups')) || [];

        // تحديث الساعة
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        window.onload = () => {
            document.getElementById('codeEditor').value = document.documentElement.outerHTML;
            document.getElementById('apiKey').value = localStorage.getItem('openrouter_key') || '';
            renderBackups();
            addLog("System environment loaded.");
        };

        function addLog(msg) {
            const logs = document.getElementById('logs');
            logs.innerHTML += `<div>> ${msg}</div>`;
            logs.scrollTop = logs.scrollHeight;
        }

        function saveKey() {
            localStorage.setItem('openrouter_key', document.getElementById('apiKey').value);
            addLog("API Key encrypted and saved to local buffer.");
            alert("تم حفظ المفتاح سحابياً.");
        }

        function executeChange() {
            const newCode = document.getElementById('searchCmd').value || document.getElementById('codeEditor').value;
            
            saveBackup(document.getElementById('codeEditor').value);
            
            addLog("Initializing code injection...");
            
            // محاكاة الفحص قبل التنفيذ
            setTimeout(() => {
                if(newCode.includes("<script") || newCode.length > 10) {
                    addLog("Validation passed. Applying kernel changes...");
                    document.getElementById('codeEditor').value = newCode;
                    // في بيئة حقيقية هنا يتم تحديث الـ DOM
                    addLog("SUCCESS: Kernel updated.");
                } else {
                    addLog("ERROR: Invalid code block. Rolling back...");
                    rollback();
                }
            }, 1000);
        }

        function saveBackup(code) {
            backups.unshift({ id: Math.floor(Math.random()*9000), date: new Date().toLocaleTimeString(), content: code });
            if(backups.length > 10) backups.pop();
            localStorage.setItem('sys_backups', JSON.stringify(backups));
            renderBackups();
        }

        function renderBackups() {
            const list = document.getElementById('backupList');
            list.innerHTML = backups.map((b, i) => `
                <div class="border border-green-900 p-2 text-[10px] hover:bg-green-900 cursor-pointer flex justify-between" onclick="restore(${i})">
                    <span>#${b.id}_BACKUP</span>
                    <span>${b.date}</span>
                </div>
            `).join('');
        }

        function restore(index) {
            document.getElementById('codeEditor').value = backups[index].content;
            addLog(`Restore point #${backups[index].id} activated.`);
        }

        async function testConnection() {
            const key = document.getElementById('apiKey').value;
            if(!key) return addLog("CRITICAL: No API Key found.");
            
            addLog("Pinging OpenRouter.ai...");
            try {
                const response = await fetch("https://openrouter.ai/api/v1/models", {
                    headers: { "Authorization": `Bearer ${key}` }
                });
                if(response.ok) addLog("SIGNAL_STRENGTH: 100% (Connected)");
                else addLog("SIGNAL_LOST: Unauthorized access.");
            } catch (e) {
                addLog("NETWORK_ERROR: Check link.");
            }
        }
    </script>
</body>
</html>
