<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوج | لوحة الإدارة المخفية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050505;
            color: #eee;
            font-family: 'Cairo', sans-serif;
            padding: 40px 20px;
            direction: rtl;
        }
        .admin-container {
            max-width: 700px;
            margin: 0 auto;
            background: #0c0c0c;
            border: 1px solid #D4AF37;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(212,175,55,0.2);
        }
        h1 { color: #D4AF37; text-align: center; margin-bottom: 30px; font-family: 'Cinzel', serif; }
        .section { margin-bottom: 30px; border-bottom: 1px solid #2a2a2a; padding-bottom: 20px; }
        h3 { color: #D4AF37; margin-bottom: 15px; }
        select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
        }
        button {
            background: #2a2a2a;
            transition: 0.2s;
        }
        button:hover { background: #D4AF37; color: black; border-color: #D4AF37; }
        .danger-btn { border-color: #ff4444; color: #ff8888; }
        .danger-btn:hover { background: #ff4444; color: white; }
        hr { margin: 20px 0; border-color: #2a2a2a; }
        .note { font-size: 12px; color: #888; margin-top: 10px; text-align: center; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #D4AF37; text-decoration: none; }
    </style>
</head>
<body>
<div class="admin-container">
    <h1>👑 لوحة تحكم أوج السرية</h1>
    <div class="section">
        <h3>🗑️ حذف تبويبة (مع كل مقالاتها)</h3>
        <select id="delete-tab-select"></select>
        <button id="delete-tab-btn" class="danger-btn">حذف التبويبة المحددة</button>
    </div>
    <div class="section">
        <h3>📄 حذف مقال</h3>
        <select id="delete-article-select"></select>
        <button id="delete-article-btn" class="danger-btn">حذف المقال المحدد</button>
    </div>
    <div class="section">
        <h3>💾 قاعدة البيانات (جاهز للربط)</h3>
        <button id="sync-database-btn">مزامنة مع قاعدة البيانات (حفظ)</button>
        <button id="load-from-db-btn">تحميل من قاعدة البيانات</button>
        <div class="note">⚠️ هذه الأزرار حالياً تجريبية، يمكنك ربطها بـ API الخاص بك لاحقاً</div>
    </div>
    <div class="section">
        <h3>📊 إحصائيات سريعة</h3>
        <div id="stats-preview"></div>
    </div>
    <a href="index.html" class="back-link">← العودة إلى الموقع الرئيسي</a>
</div>

<script>
    // قراءة البيانات من localStorage (مشتركة مع الموقع الرئيسي)
    let awjData = JSON.parse(localStorage.getItem('awj_logic')) || {};
    let articles = JSON.parse(localStorage.getItem('awj_articles')) || [];
    
    function refreshSelects() {
        // تعبئة قائمة التبويبات
        const tabSelect = document.getElementById('delete-tab-select');
        if (tabSelect) {
            let tabs = Object.keys(awjData);
            tabSelect.innerHTML = '<option value="">-- اختر تبويبة --</option>' + tabs.map(t => `<option value="${t}">${t} (${articles.filter(a=>a.category===t).length} مقال)</option>`).join('');
        }
        // تعبئة قائمة المقالات
        const artSelect = document.getElementById('delete-article-select');
        if (artSelect) {
            artSelect.innerHTML = '<option value="">-- اختر مقال --</option>' + articles.map(a => `<option value="${a.id}">${a.title} (${a.category})</option>`).join('');
        }
        // عرض الإحصائيات
        const statsDiv = document.getElementById('stats-preview');
        if (statsDiv) {
            statsDiv.innerHTML = `
                <p>📚 عدد المقالات: ${articles.length}</p>
                <p>🏷️ عدد التبويبات: ${Object.keys(awjData).length}</p>
                <p>❤️ إجمالي المشاهدات: ${articles.reduce((sum,a)=>sum+(a.views||0),0)}</p>
            `;
        }
    }
    
    // حذف تبويبة
    document.getElementById('delete-tab-btn')?.addEventListener('click', () => {
        let tabName = document.getElementById('delete-tab-select').value;
        if (!tabName) { alert("اختر تبويبة أولاً"); return; }
        if (confirm(`⚠️ هل أنت متأكد من حذف التبويبة "${tabName}" وجميع مقالاتها (${articles.filter(a=>a.category===tabName).length} مقال)؟`)) {
            delete awjData[tabName];
            articles = articles.filter(a => a.category !== tabName);
            localStorage.setItem('awj_logic', JSON.stringify(awjData));
            localStorage.setItem('awj_articles', JSON.stringify(articles));
            refreshSelects();
            // تسجيل في السجل الأمني
            let logs = JSON.parse(localStorage.getItem('security_logs')) || [];
            logs.unshift({ time: new Date().toLocaleString(), action: `حذف تبويبة: ${tabName} من admin` });
            localStorage.setItem('security_logs', JSON.stringify(logs.slice(0,50)));
            alert(`✅ تم حذف التبويبة "${tabName}"`);
        }
    });
    
    // حذف مقال
    document.getElementById('delete-article-btn')?.addEventListener('click', () => {
        let artId = document.getElementById('delete-article-select').value;
        if (!artId) { alert("اختر مقالاً أولاً"); return; }
        let art = articles.find(a => a.id == artId);
        if (!art) return;
        if (confirm(`⚠️ هل أنت متأكد من حذف المقال "${art.title}"؟`)) {
            articles = articles.filter(a => a.id != artId);
            localStorage.setItem('awj_articles', JSON.stringify(articles));
            refreshSelects();
            let logs = JSON.parse(localStorage.getItem('security_logs')) || [];
            logs.unshift({ time: new Date().toLocaleString(), action: `حذف مقال: ${art.title} (${art.category}) من admin` });
            localStorage.setItem('security_logs', JSON.stringify(logs.slice(0,50)));
            alert(`✅ تم حذف المقال "${art.title}"`);
        }
    });
    
    // قاعدة البيانات (جاهز للربط)
    async function saveToDatabase() {
        const data = { awjData, articles, userStats: JSON.parse(localStorage.getItem('user_stats')||'{}'), favorites: JSON.parse(localStorage.getItem('favorites')||'[]'), viewHistory: JSON.parse(localStorage.getItem('view_history')||'[]') };
        console.log("📡 حفظ البيانات إلى الخادم:", data);
        // هنا يمكنك إضافة fetch إلى API الخاص بك
        // await fetch('/api/save', { method: 'POST', body: JSON.stringify(data), headers: { 'Content-Type': 'application/json' } });
        alert("جاهز للحفظ في قاعدة البيانات - أضف كود fetch الخاص بك هنا");
    }
    async function loadFromDatabase() {
        console.log("📡 تحميل البيانات من الخادم");
        // const res = await fetch('/api/load');
        // const data = await res.json();
        // localStorage.setItem('awj_logic', JSON.stringify(data.awjData));
        // localStorage.setItem('awj_articles', JSON.stringify(data.articles));
        // location.reload();
        alert("جاهز للتحميل من قاعدة البيانات - أضف كود fetch الخاص بك");
    }
    document.getElementById('sync-database-btn')?.addEventListener('click', saveToDatabase);
    document.getElementById('load-from-db-btn')?.addEventListener('click', loadFromDatabase);
    
    // تحديث البيانات أولاً
    refreshSelects();
    
    // إضافة سجل أمني لفتح لوحة الإدارة
    let logs = JSON.parse(localStorage.getItem('security_logs')) || [];
    logs.unshift({ time: new Date().toLocaleString(), action: "فتح لوحة الإدارة المخفية" });
    localStorage.setItem('security_logs', JSON.stringify(logs.slice(0,50)));
</script>
</body>
</html>
