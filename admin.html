<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوج | مركز القيادة المستقر</title>
    
    <!-- 1. مكتبات Firebase (النسخة المستقرة) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body { background: #0A0B10; color: #eee; direction: rtl; padding: 1rem; }
        .card { background: #0C0F17; border: 1px solid #2a2a35; border-radius: 1.2rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .hidden { display: none !important; }
        input, select, textarea { background: #1a1c25; border: 1px solid #2a2a35; padding: 0.8rem; border-radius: 0.8rem; color: white; width: 100%; margin-bottom: 10px; outline: none; }
        button { background: #D4AF37; color: #000; border: none; padding: 0.8rem 1.5rem; border-radius: 2rem; cursor: pointer; font-weight: bold; width: 100%; }
        .flex-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .sub-item { background: #2a2a35; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; margin: 3px; display: inline-block; }
    </style>
</head>
<body>

<div id="app">
    <!-- المرحلة 1: شفرة العبور -->
    <div id="vaultLock" class="card" style="max-width: 400px; margin: 10vh auto;">
        <h2 style="color:#D4AF37; text-align:center; margin-bottom:20px;">🔒 بوابة أوج</h2>
        <input type="password" id="vaultKey" placeholder="شفرة السيادة...">
        <button onclick="checkVaultKey()">فتح البوابة</button>
    </div>

    <!-- المرحلة 2: تسجيل الدخول -->
    <div id="loginPanel" class="card hidden" style="max-width: 400px; margin: 10vh auto;">
        <h2 style="text-align:center; margin-bottom:20px;">🔐 دخول الإدارة</h2>
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="loginPassword" placeholder="كلمة المرور">
        <button id="loginBtn">دخول</button>
    </div>

    <!-- المرحلة 3: لوحة التحكم -->
    <div id="adminPanel" class="hidden" style="max-width: 1000px; margin: auto;">
        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <h1 style="color:#D4AF37;">AWJ CONTROL</h1>
            <button onclick="firebase.auth().signOut()" style="width:auto; background:#333; color:#fff;">خروج</button>
        </div>

        <div class="card">
            <h3>📁 الأقسام</h3>
            <div class="flex-row">
                <input type="text" id="catInput" placeholder="قسم جديد" style="margin:0;">
                <button onclick="addNewCategory()" style="width:auto;">إضافة</button>
            </div>
            <div id="categoriesDisplay"></div>
        </div>

        <div class="card">
            <h3>📝 نشر وثيقة</h3>
            <input type="text" id="postTitle" placeholder="عنوان الوثيقة">
            <select id="postAuthor"></select>
            <div class="flex-row">
                <select id="postCat" onchange="syncSubfields()"></select>
                <select id="postSub"></select>
            </div>
            <textarea id="postContent" rows="5" placeholder="نص الوثيقة..."></textarea>
            <button onclick="publishNow()">🚀 نشر الوثيقة</button>
        </div>
    </div>
</div>

<script>
    // 1. التكوين والأمن
    const MASTER_KEY = "@...Alshanfricc_1998...@";
    const firebaseConfig = {
        apiKey: "AIzaSyDjgVxvtPXTn1tpr4IxOK3wOW4r3gzB1VU",
        authDomain: "awj-website-29f16.firebaseapp.com",
        projectId: "awj-website-29f16",
        storageBucket: "awj-website-29f16.firebasestorage.app",
        appId: "1:406747568578:web:741821d3c60df0011b5e5b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let allCategories = [];

    // 2. دوال الحماية
    function checkVaultKey() {
        const input = document.getElementById('vaultKey').value;
        if(input === MASTER_KEY) {
            document.getElementById('vaultLock').classList.add('hidden');
            document.getElementById('loginPanel').classList.remove('hidden');
        } else { alert("وصول مرفوض."); }
    }

    // 3. نظام الدخول
    document.getElementById('loginBtn').onclick = () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        firebase.auth().signInWithEmailAndPassword(email, pass)
            .catch(e => alert("خطأ: " + e.message));
    };

    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            document.getElementById('loginPanel').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            initDataListeners();
        } else {
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('vaultLock').classList.remove('hidden');
        }
    });

    // 4. إدارة البيانات
    function initDataListeners() {
        // الاستماع للأقسام
        db.collection('categories').onSnapshot(snap => {
            allCategories = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderCategories();
            updateDropdowns();
        });

        // الاستماع للكتّاب
        db.collection('authors').onSnapshot(snap => {
            const sel = document.getElementById('postAuthor');
            sel.innerHTML = '<option>اختر الكاتب</option>';
            snap.docs.forEach(d => {
                sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`;
            });
        });
    }

    async function addNewCategory() {
        const name = document.getElementById('catInput').value;
        if(name) await db.collection('categories').add({name, subfields: []});
        document.getElementById('catInput').value = '';
    }

    function renderCategories() {
        const container = document.getElementById('categoriesDisplay');
        container.innerHTML = allCategories.map(c => `
            <div style="background:#12141E; padding:10px; border-radius:10px; margin-bottom:10px;">
                <strong>${c.name}</strong>
                <div>${c.subfields.map(s => `<span class="sub-item">${s}</span>`).join('')}</div>
                <div class="flex-row" style="margin-top:10px;">
                    <input type="text" id="sub-${c.id}" placeholder="فرع جديد" style="margin:0;">
                    <button onclick="addSubfield('${c.id}')" style="width:auto;">+</button>
                </div>
            </div>
        `).join('');
    }

    async function addSubfield(id) {
        const val = document.getElementById('sub-'+id).value;
        const cat = allCategories.find(c => c.id === id);
        if(val) await db.collection('categories').doc(id).update({
            subfields: firebase.firestore.FieldValue.arrayUnion(val)
        });
    }

    function updateDropdowns() {
        const catSel = document.getElementById('postCat');
        catSel.innerHTML = '<option value="">القسم الرئيسي</option>';
        allCategories.forEach(c => catSel.innerHTML += `<option value="${c.name}">${c.name}</option>`);
    }

    function syncSubfields() {
        const name = document.getElementById('postCat').value;
        const subSel = document.getElementById('postSub');
        const cat = allCategories.find(c => c.name === name);
        subSel.innerHTML = '<option value="">الفرع</option>';
        if(cat && cat.subfields) {
            cat.subfields.forEach(s => subSel.innerHTML += `<option value="${s}">${s}</option>`);
        }
    }

    async function publishNow() {
        const data = {
            title: document.getElementById('postTitle').value,
            author: document.getElementById('postAuthor').value,
            category: document.getElementById('postCat').value,
            subfield: document.getElementById('postSub').value,
            content: document.getElementById('postContent').value,
            date: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        if(!data.title || !data.content) return alert("املأ البيانات الأساسية.");
        
        await db.collection('articles').add(data);
        alert("تم النشر بنجاح!");
        document.getElementById('postTitle').value = '';
        document.getElementById('postContent').value = '';
    }
</script>
</body>
</html>
