    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --gold: #D4AF37; --dark: #0A0B10; --card: #0C0F17; --border: #2a2a35; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--dark); color: #eee; direction: rtl;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 1.5rem; min-height: 100vh;
        }
        .container { max-width: 1400px; margin: auto; }
        
        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; border-bottom: 1px solid var(--border);
            padding-bottom: 1rem; flex-wrap: wrap; gap: 1rem;
        }
        .logo { font-size: 2rem; color: var(--gold); font-weight: bold; letter-spacing: 2px; }
        .stats-badge { background: #1e1e2a; padding: 0.4rem 1rem; border-radius: 40px; font-size: 0.8rem; }
        
        .grid-2col { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .card h2 {
            color: var(--gold); margin-bottom: 1rem;
            border-right: 3px solid var(--gold); padding-right: 0.8rem;
            font-size: 1.2rem;
        }
        .flex-row {
            display: flex; gap: 1rem; flex-wrap: wrap;
            align-items: center; margin-bottom: 1rem;
        }
        
        input, select, textarea {
            background: #1a1c25; border: 1px solid var(--border);
            padding: 0.7rem 1rem; border-radius: 1rem;
            color: white; width: 100%; margin-bottom: 0.8rem;
            font-size: 0.95rem; transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--gold);
        }
        textarea { resize: vertical; min-height: 80px; }
        
        button {
            background: var(--gold); color: #000; border: none;
            padding: 0.6rem 1.2rem; border-radius: 2rem;
            cursor: pointer; font-weight: bold; transition: 0.2s;
            font-size: 0.9rem; white-space: nowrap;
        }
        button:hover { opacity: 0.85; transform: scale(0.98); }
        .btn-outline {
            background: transparent; border: 1px solid var(--gold);
            color: var(--gold);
        }
        .btn-outline:hover { background: var(--gold); color: #000; }
        .btn-danger {
            background: transparent; border: 1px solid #ff4444;
            color: #ff4444;
        }
        .btn-danger:hover { background: #ff4444; color: white; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        
        .block-editor {
            background: #12141E; border-radius: 1rem;
            padding: 1rem; margin-bottom: 1rem;
            border: 1px solid var(--border);
        }
        .block-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 0.8rem;
            cursor: move; padding-bottom: 0.5rem;
            border-bottom: 1px solid #1e1e2a;
        }
        .block-type-label {
            font-weight: bold; color: var(--gold);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .delete-block {
            background: none; border: none; color: #ff7777;
            font-size: 1.2rem; cursor: pointer; transition: 0.2s;
            padding: 0.2rem;
        }
        .delete-block:hover { color: #ff4444; transform: scale(1.1); }
        .image-preview {
            max-width: 100%; max-height: 180px;
            margin-top: 0.5rem; border-radius: 0.8rem;
            border: 1px solid var(--border);
        }
        .code-preview {
            background: #0D0F14; padding: 0.8rem;
            border-radius: 0.8rem; margin-top: 0.5rem;
            overflow-x: auto; border: 1px solid var(--border);
        }
        .block-actions {
            display: flex; gap: 0.5rem; margin-top: 0.5rem;
        }
        
        .message {
            padding: 0.8rem; border-radius: 1rem;
            margin-top: 1rem; text-align: center;
            display: none; font-size: 0.9rem;
        }
        .message.show { display: block; }
        .success { background: #1e4620; color: #4caf50; border: 1px solid #2e7d32; }
        .error { background: #3b1515; color: #ff7777; border: 1px solid #8b2c2c; }
        .info { background: #1a237e; color: #7986cb; border: 1px solid #3949ab; }
        
        .sub-item {
            background: #2a2a35; display: inline-flex;
            align-items: center; gap: 0.4rem;
            padding: 0.3rem 0.8rem; border-radius: 40px;
            margin-left: 0.5rem; margin-bottom: 0.3rem;
            font-size: 0.85rem;
        }
        .sub-item i { cursor: pointer; color: #ff7777; transition: 0.2s; }
        .sub-item i:hover { color: #ff4444; }
        .category-box {
            background: #12141E; border-radius: 1rem;
            padding: 1rem; margin-bottom: 1rem;
            border: 1px solid var(--border);
        }
        .category-box h4 { color: var(--gold); margin-bottom: 0.5rem; }
        
        .social-item {
            display: flex; justify-content: space-between;
            align-items: center; padding: 0.6rem 0;
            border-bottom: 1px solid #1e1e2a;
        }
        .social-item:last-child { border-bottom: none; }
        
        .scroll-top {
            position: fixed; bottom: 1.5rem; left: 1.5rem;
            background: var(--gold); width: 45px; height: 45px;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transition: 0.3s;
            z-index: 999; border: none;
        }
        .scroll-top.visible { opacity: 1; }
        .scroll-top:hover { transform: scale(1.1); }
        
        .login-card {
            max-width: 450px; margin: 5rem auto;
            text-align: center;
        }
        .login-card h2 { text-align: right; }
        .login-card input { margin-bottom: 1rem; }
        .login-card button { width: 100%; margin-top: 0.5rem; }
        
        .empty-state { color: #666; text-align: center; padding: 1rem; }
        
        .chart-container { position: relative; height: 250px; width: 100%; }
        
        @media (max-width: 900px) {
            .grid-2col { grid-template-columns: 1fr; }
            body { padding: 1rem; }
        }
        @media (max-width: 500px) {
            .logo { font-size: 1.5rem; }
            .card { padding: 1rem; }
            .flex-row { flex-direction: column; align-items: stretch; }
            .flex-row > * { width: 100% !important; }
        }
    </style>
</head>

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';

    function showMsg(elId, text, type) {
        const d = document.getElementById(elId);
        d.innerHTML = text;
        d.className = `message ${type} show`;
        setTimeout(() => d.className = 'message', 4000);
    }

    async function initAdmin() {
        await Promise.all([
            loadCategories(),
            loadAuthors(),
            loadSettings(),
            loadArticlesList()
        ]);
        loadBlocksFromLocal();
        updateStats();
    }

    async function updateStats() {
        if (!db) return;
        try {
            const articlesSnap = await db.collection('articles').get();
            const articles = articlesSnap.docs.map(d => ({ 
                id: d.id, 
                views: d.data().views || 0, 
                title: d.data().title || 'بدون عنوان'
            }));
            
            const totalViews = articles.reduce((sum, a) => sum + a.views, 0);
            document.getElementById('statArticles').innerText = articles.length;
            document.getElementById('statViews').innerText = totalViews.toLocaleString('ar-EG');
            document.getElementById('statAuthors').innerText = authors.length;
            document.getElementById('statCategories').innerText = categories.length;

            const top5 = [...articles].sort((a, b) => b.views - a.views).slice(0, 5);
            const labels = top5.map(a => a.title.length > 15 ? a.title.slice(0, 15) + '...' : a.title);
            const data = top5.map(a => a.views);
            
            if (viewsChart) viewsChart.destroy();
            
            const ctx = document.getElementById('viewsChart').getContext('2d');
            viewsChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'عدد المشاهدات',
                        data,
                        backgroundColor: '#D4AF37',
                        borderRadius: 6,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e1e2a',
                            titleColor: '#D4AF37',
                            bodyColor: '#fff',
                            borderColor: '#D4AF37',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#1e1e2a' },
                            ticks: { color: '#888' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#888', font: { size: 11 } }
                        }
                    }
                }
            });
        } catch (e) {
            console.error("Stats error:", e);
        }
    }

    async function loadCategories() {
        if (!db) return;
        try {
            const snap = await db.collection('categories').orderBy('name').get();
            categories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderCategoriesList();
            updateCategorySelects();
        } catch (e) {
            console.error("Categories error:", e);
        }
    }

    function renderCategoriesList() {
        const div = document.getElementById('catsList');
        if (!categories.length) {
            div.innerHTML = '<div class="empty-state">لا توجد تبويبات. أضف تبويبة أولاً.</div>';
            return;
        }
        
        div.innerHTML = categories.map(cat => `
            <div class="category-box">
                <div class="flex-row" style="justify-content:space-between; margin-bottom:0.5rem;">
                    <h4>📁 ${escapeHtml(cat.name)}</h4>
                    <button class="btn-danger btn-sm" onclick="deleteCategory('${cat.id}')">🗑️ حذف</button>
                </div>
                <div style="margin: 0.5rem 0;">
                    ${(cat.subfields || []).map(sub => `
                        <span class="sub-item">
                            ${escapeHtml(sub)}
                            <i class="fas fa-times-circle" onclick="removeSubfield('${cat.id}', '${escapeHtml(sub)}')"></i>
                        </span>
                    `).join('')}
                </div>
                <div class="flex-row">
                    <input type="text" id="sub-${cat.id}" placeholder="فرع جديد" style="flex:2;">
                    <button class="btn-outline btn-sm" onclick="addSubfield('${cat.id}')">إضافة فرع</button>
                </div>
            </div>
        `).join('');
    }

    window.deleteCategory = async (id) => {
        if (!confirm('⚠️ سيتم حذف التبويبة وجميع فروعها نهائياً. هل أنت متأكد؟')) return;
        try {
            await db.collection('categories').doc(id).delete();
            loadCategories();
            showMsg('publishMsg', '✅ تم حذف التبويبة', 'success');
        } catch (e) {
            showMsg('publishMsg', '❌ فشل الحذف: ' + e.message, 'error');
        }
    };

    window.addSubfield = async (catId) => {
        const input = document.getElementById(`sub-${catId}`);
        const subName = input.value.trim();
        if (!subName) return;
        
        const cat = categories.find(c => c.id === catId);
        if (!cat) return;
        
        const newSubs = [...(cat.subfields || []), subName];
        try {
            await db.collection('categories').doc(catId).update({ subfields: newSubs });
            input.value = '';
            loadCategories();
        } catch (e) {
            showMsg('publishMsg', '❌ ' + e.message, 'error');
        }
    };

    window.removeSubfield = async (catId, subName) => {
        const cat = categories.find(c => c.id === catId);
        if (!cat) return;
        
        const newSubs = (cat.subfields || []).filter(s => s !== subName);
        try {
            await db.collection('categories').doc(catId).update({ subfields: newSubs });
            loadCategories();
        } catch (e) {
            showMsg('publishMsg', '❌ ' + e.message, 'error');
        }
    };

    document.getElementById('addCatBtn').onclick = async () => {
        const name = document.getElementById('newCatName').value.trim();
        if (!name) {
            showMsg('publishMsg', '❌ أدخل اسم التبويبة', 'error');
            return;
        }
        try {
            await db.collection('categories').add({ name, subfields: [] });
            document.getElementById('newCatName').value = '';
            loadCategories();
            showMsg('publishMsg', '✅ تم إضافة التبويبة', 'success');
        } catch (e) {
            showMsg('publishMsg', '❌ ' + e.message, 'error');
        }
    };

    document.getElementById('addMultiSubsBtn').onclick = async () => {
        const catName = document.getElementById('newCatName').value.trim();
        if (!catName) {
            showMsg('publishMsg', '❌ اكتب اسم التبويبة في حقل "اسم التبويبة الجديدة" أولاً', 'error');
            return;
        }
        
        const cat = categories.find(c => c.name === catName);
        if (!cat) {
            showMsg('publishMsg', '❌ التبويبة غير موجودة. أضفها أولاً.', 'error');
            return;
        }
        
        const raw = document.getElementById('multiSubs').value;
        let subs = raw.split(/[\n,،]/).map(s => s.trim()).filter(s => s !== '');
        if (subs.length === 0) {
            showMsg('publishMsg', '❌ أدخل فروعاً صالحة', 'error');
            return;
        }
        
        const newSubs = [...new Set([...(cat.subfields || []), ...subs])];
        try {
            await db.collection('categories').doc(cat.id).update({ subfields: newSubs });
            document.getElementById('multiSubs').value = '';
            loadCategories();
            showMsg('publishMsg', `✅ تم إضافة ${subs.length} فرع`, 'success');
        } catch (e) {
            showMsg('publishMsg', '❌ ' + e.message, 'error');
        }
    };

    function updateCategorySelects() {
        const catSelect = document.getElementById('catSelect');
        const subSelect = document.getElementById('subSelect');
        
        catSelect.innerHTML = '<option value="">اختر التبويبة</option>';
        categories.forEach(c => {
            catSelect.innerHTML += `<option value="${escapeHtml(c.name)}">${escapeHtml(c.name)}</option>`;
        });
        
        catSelect.onchange = () => {
            const catName = catSelect.value;
            const cat = categories.find(c => c.name === catName);
            subSelect.innerHTML = '<option value="">اختر الفرع</option>';
            if (cat && cat.subfields) {
                cat.subfields.forEach(sub => {
                    subSelect.innerHTML += `<option value="${escapeHtml(sub)}">${escapeHtml(sub)}</option>`;
                });
            }
        };
    }

    async function loadAuthors() {
        if (!db) return;
        try {
            const snap = await db.collection('authors').orderBy('name').get();
            authors = snap.docs.map(d => ({ id: d.id, name: d.data().name }));
            renderAuthorsList();
            updateAuthorSelect();
        } catch (e) {
            console.error("Authors error:", e);
        }
    }

    function renderAuthorsList() {
        const div = document.getElementById('authorsList');
        if (!authors.length) {
            div.innerHTML = '<div class="empty-state">لا يوجد كتاب. أضف كاتباً أولاً.</div>';
            return;
        }
        
        div.innerHTML = authors.map(a => `
            <div class="flex-row" style="justify-content:space-between; margin-bottom:0.5rem; padding:0.5rem; background:#12141E; border-radius:0.5rem;">
                <span>✍️ ${escapeHtml(a.name)}</span>
                <button class="btn-danger btn-sm" onclick="deleteAuthor('${a.id}')">حذف</button>
            </div>
        `).join('');
    }

    window.deleteAuthor = async (id) => {
        if (!confirm('سيتم حذف هذا الكاتب. متأكد؟')) return;
        try {
            await db.collection('authors').doc(id).delete();
            loadAuthors();
            showMsg('publishMsg', '✅ تم حذف الكاتب', 'success');
        } catch (e) {
            showMsg('publishMsg', '❌ ' + e.message, 'error');
        }
    };

    document.getElementById('addAuthorBtn').onclick = async () => {
        const name = document.getElementById('newAuthorName').value.trim();
        if (!name) {
            showMsg('publishMsg', '❌ أدخل اسم الكاتب', 'error');
            return;
        }
        try {
            await db.collection('authors').add({ name });
            document.getElementById('newAuthorName').value = '';
            loadAuthors();
            showMsg('publishMsg', '✅ تم إضافة الكاتب', 'success');
        } catch (e) {
            showMsg('publishMsg', '❌ ' + e.message, 'error');
        }
    };

    function updateAuthorSelect() {
        const sel = document.getElementById('authorSelect');
        sel.innerHTML = '<option value="">اختر الكاتب</option>';
        authors.forEach(a => {
            sel.innerHTML += `<option value="${escapeHtml(a.name)}">${escapeHtml(a.name)}</option>`;
        });
    }

    async function loadSettings() {
        if (!db) return;
        try {
            const doc = await db.collection('settings').doc('social').get();
            if (doc.exists) {
                const data = doc.data();
                socialLinks = data.socialLinks || [];
                secondarySite = data.secondarySite || { name: '', url: '' };
            } else {
                socialLinks = [];
                secondarySite = { name: '', url: '' };
            }
            renderSocialList();
            document.getElementById('secondarySiteName').value = secondarySite.name;
            document.getElementById('secondarySiteUrl').value = secondarySite.url;
        } catch (e) {
            console.error("Settings error:", e);
        }
    }

    function renderSocialList() {
        const container = document.getElementById('socialLinksList');
        if (!socialLinks.length) {
            container.innerHTML = '<div class="empty-state">لا توجد حسابات تواصل اجتماعي مضافة.</div>';
            return;
        }
        
        container.innerHTML = '<strong style="color:var(--gold); display:block; margin-bottom:0.5rem;">الحسابات المضافة:</strong>';
        container.innerHTML += socialLinks.map((item, idx) => `
            <div class="social-item">
                <span><i class="fab fa-${escapeHtml(item.platform)}"></i> ${escapeHtml(item.username)} — ${escapeHtml(item.url)}</span>
                <button class="btn-danger btn-sm" onclick="removeSocial(${idx})">🗑️</button>
            </div>
        `).join('');
    }

    window.removeSocial = async (idx) => {
        socialLinks.splice(idx, 1);
        await saveSocialSettings();
    };

    document.getElementById('addSocialBtn').onclick = async () => {
        const platform = document.getElementById('platformSelect').value;
        const username = document.getElementById('socialUsername').value.trim();
        const url = document.getElementById('socialUrl').value.trim();
        
        if (!username || !url) {
            showMsg('publishMsg', '❌ أدخل اسم المستخدم والرابط', 'error');
            return;
        }
        
        socialLinks.push({ platform, username, url });
        await saveSocialSettings();
        document.getElementById('socialUsername').value = '';
        document.getElementById('socialUrl').value = '';
    };

    document.getElementById('saveSecondaryBtn').onclick = async () => {
        secondarySite.name = document.getElementById('secondarySiteName').value.trim();
        secondarySite.url = document.getElementById('secondarySiteUrl').value.trim();
        await saveSocialSettings();
    };

    async function saveSocialSettings() {
        if (!db) return;
        try {
            await db.collection('settings').doc('social').set({ socialLinks, secondarySite });
            loadSettings();
            showMsg('publishMsg', '✅ تم حفظ الإعدادات', 'success');
        } catch (e) {
            showMsg('publishMsg', '❌ ' + e.message, 'error');
        }
    }

    function addBlock(type) {
        let newBlock;
        switch (type) {
            case 'text':
                newBlock = { type, value: '<p>اكتب محتوى النص هنا. يدعم <strong>HTML</strong> بالكامل.</p>' };
                break;
            case 'image':
                newBlock = { type, value: { url: '', caption: '' } };
                break;
            case 'code':
                newBlock = { type, value: { code: '// اكتب كودك هنا\nconsole.log("Hello AWJ");', language: 'javascript' } };
                break;
            case 'summary':
                newBlock = { type, value: 'ملخص سريع للمقال...' };
                break;
        }
        
        if (newBlock) {
            blocks.push(newBlock);
            renderBlocks();
            saveBlocksToLocal();
        }
    }

    window.deleteBlock = (idx) => {
        if (!confirm('حذف هذه الكتلة؟')) return;
        blocks.splice(idx, 1);
        renderBlocks();
        saveBlocksToLocal();
    };

    window.updateBlockValue = (idx, field, value) => {
        if (!blocks[idx]) return;
        if (field === null) {
            blocks[idx].value = value;
        } else {
            if (typeof blocks[idx].value !== 'object') blocks[idx].value = {};
            blocks[idx].value[field] = value;
        }
        saveBlocksToLocal();
        if (field !== 'code' && field !== null) renderBlocks();
    };

    window.uploadImage = async (idx, fileInput) => {
        const file = fileInput.files[0];
        if (!file) return;
        
        if (!file.type.startsWith('image/')) {
            showMsg('publishMsg', '❌ الملف يجب أن يكون صورة', 'error');
            return;
        }
        
        if (file.size > 5 * 1024 * 1024) {
            showMsg('publishMsg', '❌ حجم الصورة يجب أن يكون أقل من 5 ميجا', 'error');
            return;
        }
        
        try {
            const storageRef = storage.ref(`articles/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`);
            await storageRef.put(file);
            const url = await storageRef.getDownloadURL();
            blocks[idx].value.url = url;
            saveBlocksToLocal();
            renderBlocks();
            showMsg('publishMsg', '✅ تم رفع الصورة', 'success');
        } catch (e) {
            showMsg('publishMsg', '❌ فشل رفع الصورة: ' + e.message, 'error');
        }
    };

    function renderBlocks() {
        const container = document.getElementById('blocksEditor');
        if (!blocks.length) {
            container.innerHTML = '<div class="empty-state">➕ أضف كتلة جديدة باستخدام الأزرار أعلاه</div>';
            if (sortableInstance) sortableInstance.destroy();
            return;
        }
        
        container.innerHTML = '';
        blocks.forEach((block, idx) => {
            const div = document.createElement('div');
            div.className = 'block-editor';
            div.setAttribute('data-idx', idx);
            
            const typeLabels = {
                text: '📝 نص HTML',
                image: '🖼️ صورة',
                code: '💻 كود',
                summary: '✨ مختصر'
            };
            
            let innerHtml = `
                <div class="block-header">
                    <span class="block-type-label">${typeLabels[block.type] || block.type}</span>
                    <button class="delete-block" onclick="deleteBlock(${idx})" title="حذف الكتلة">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `;
            
            switch (block.type) {
                case 'text':
                    innerHtml += `<textarea rows="6" placeholder="اكتب المحتوى هنا (يدعم HTML كامل)" onblur="updateBlockValue(${idx}, null, this.value)">${escapeHtml(block.value)}</textarea>`;
                    break;
                    
                case 'image':
                    innerHtml += `<input type="file" accept="image/*" onchange="uploadImage(${idx}, this)">`;
                    if (block.value && block.value.url) {
                        innerHtml += `
                            <img src="${escapeHtml(block.value.url)}" class="image-preview" alt="معاينة">
                            <input type="text" placeholder="التسمية (اختياري)" 
                                value="${escapeHtml(block.value.caption || '')}" 
                                onblur="updateBlockValue(${idx}, 'caption', this.value)">
                        `;
                    }
                    break;
                    
                case 'code':
                    innerHtml += `
                        <select onchange="updateBlockValue(${idx}, 'language', this.value)" style="margin-bottom:0.5rem;">
                            ${languages.map(lang => `<option value="${lang}" ${block.value.language === lang ? 'selected' : ''}>${lang}</option>`).join('')}
                        </select>
                        <textarea rows="8" placeholder="اكتب الكود هنا" 
                            onblur="updateBlockValue(${idx}, 'code', this.value)">${escapeHtml(block.value.code)}</textarea>
                        <div class="code-preview">
                            <strong style="color:var(--gold); display:block; margin-bottom:0.5rem;">معاينة:</strong>
                            <pre><code class="language-${escapeHtml(block.value.language)}">${escapeHtml(block.value.code)}</code></pre>
                        </div>
                    `;
                    break;
                    
                case 'summary':
                    innerHtml += `<textarea rows="3" placeholder="مختصر المقال (يدعم HTML)" 
                        onblur="updateBlockValue(${idx}, null, this.value)">${escapeHtml(block.value)}</textarea>`;
                    break;
            }
            
            div.innerHTML = innerHtml;
            container.appendChild(div);
            
            if (block.type === 'code') {
                const codeElem = div.querySelector('pre code');
                if (codeElem && window.hljs) hljs.highlightElement(codeElem);
            }
        });
        
        if (sortableInstance) sortableInstance.destroy();
        sortableInstance = new Sortable(container, {
            animation: 200,
            handle: '.block-header',
            ghostClass: 'sortable-ghost',
            onEnd: () => {
                const newBlocks = [];
                document.querySelectorAll('.block-editor').forEach(el => {
                    const oldIdx = parseInt(el.getAttribute('data-idx'));
                    if (blocks[oldIdx]) newBlocks.push(blocks[oldIdx]);
                });
                blocks = newBlocks;
                saveBlocksToLocal();
                renderBlocks();
            }
        });
    }

    function saveBlocksToLocal() {
        localStorage.setItem('admin_blocks', JSON.stringify(blocks));
    }

    function loadBlocksFromLocal() {
        const saved = localStorage.getItem('admin_blocks');
        if (saved) {
            try {
                blocks = JSON.parse(saved);
            } catch (e) {
                blocks = [];
                console.error("Local blocks parse error:", e);
            }
        } else {
            blocks = [];
        }
        renderBlocks();
    }

    document.getElementById('publishBtn').onclick = async () => {
        const title = document.getElementById('articleTitle').value.trim();
        const author = document.getElementById('authorSelect').value;
        const category = document.getElementById('catSelect').value;
        const subfield = document.getElementById('subSelect').value;
        
        if (!title) {
            showMsg('publishMsg', '❌ أدخل عنوان المقال', 'error');
            return;
        }
        if (!author) {
            showMsg('publishMsg', '❌ اختر الكاتب', 'error');
            return;
        }
        if (!category) {
            showMsg('publishMsg', '❌ اختر التبويبة', 'error');
            return;
        }
        if (!subfield) {
            showMsg('publishMsg', '❌ اختر الفرع', 'error');
            return;
        }
        if (blocks.length === 0) {
            showMsg('publishMsg', '❌ أضف كتلة واحدة على الأقل', 'error');
            return;
        }
        
        const cleanBlocks = blocks.map(b => {
            if (b.type === 'image') {
                return {
                    type: 'image',
                    value: {
                        url: (b.value && b.value.url) || '',
                        caption: (b.value && b.value.caption) || ''
                    }
                };
            }
            return b;
        });
        
        try {
            await db.collection('articles').add({
                title,
                author,
                category,
                subfield,
                contentBlocks: cleanBlocks,
                views: 0,
                date: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            showMsg('publishMsg', '✅ تم نشر المقال بنجاح!', 'success');
            blocks = [];
            localStorage.removeItem('admin_blocks');
            document.getElementById('articleTitle').value = '';
            document.getElementById('catSelect').value = '';
            document.getElementById('subSelect').innerHTML = '<option value="">اختر الفرع</option>';
            renderBlocks();
            updateStats();
            loadArticlesList();
        } catch (err) {
            showMsg('publishMsg', '❌ فشل النشر: ' + err.message, 'error');
        }
    };

    document.getElementById('addTextBtn').onclick = () => addBlock('text');
    document.getElementById('addImageBtn').onclick = () => addBlock('image');
    document.getElementById('addCodeBtn').onclick = () => addBlock('code');
    document.getElementById('addSummaryBtn').onclick = () => addBlock('summary');

    async function loadArticlesList() {
        if (!db) return;
        try {
            const snap = await db.collection('articles').orderBy('date', 'desc').get();
            const articles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            const div = document.getElementById('articlesList');
            if (!articles.length) {
                div.innerHTML = '<div class="empty-state">لا توجد مقالات منشورة.</div>';
                return;
            }
            
            div.innerHTML = articles.map(a => `
                <div class="flex-row" style="justify-content:space-between; padding:0.8rem; background:#12141E; border-radius:0.8rem; margin-bottom:0.5rem;">
                    <div style="flex:1;">
                        <strong style="color:var(--gold);">${escapeHtml(a.title)}</strong>
                        <div style="font-size:0.8rem; color:#888; margin-top:0.3rem;">
                            ${escapeHtml(a.author || '')} | ${escapeHtml(a.category || '')} | ${escapeHtml(a.subfield || '')} | 👁️ ${a.views || 0}
                        </div>
                    </div>
                    <button class="btn-danger btn-sm" onclick="deleteArticle('${a.id}')">🗑️ حذف</button>
                </div>
            `).join('');
        } catch (e) {
            console.error("Articles list error:", e);
        }
    }

    window.deleteArticle = async (id) => {
        if (!confirm('⚠️ سيتم حذف المقال نهائياً. هل أنت متأكد؟')) return;
        try {
            await db.collection('articles').doc(id).delete();
            loadArticlesList();
            updateStats();
            showMsg('publishMsg', '✅ تم حذف المقال', 'success');
        } catch (e) {
            showMsg('publishMsg', '❌ ' + e.message, 'error');
        }
    };

    const scrollBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 400) scrollBtn.classList.add('visible');
        else scrollBtn.classList.remove('visible');
    });
    scrollBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

    function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str).replace(/[&<>"']/g, m => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
        })[m]);
    }
</script>
</body>
</html>
