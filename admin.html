<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوج | لوحة التحكم السيادية</title>
    <!-- Firebase & Dependencies -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body { background: #0A0B10; color: #eee; direction: rtl; padding: 1.5rem; }
        .container { max-width: 1400px; margin: auto; }
        .card { background: #0C0F17; border: 1px solid #2a2a35; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .logo { font-size: 2rem; color: #D4AF37; font-weight: bold; }
        input, select, textarea { background: #1a1c25; border: 1px solid #2a2a35; padding: 0.7rem 1rem; border-radius: 1rem; color: white; width: 100%; margin-bottom: 0.8rem; }
        button { background: #D4AF37; color: #000; border: none; padding: 0.6rem 1.2rem; border-radius: 2rem; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
        /* أنماط إضافية للمحرر */
        .block { background: #12141E; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; border: 1px solid #2a2a35; }
        .flex-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
        .sub-item { background: #2a2a35; padding: 0.2rem 0.8rem; border-radius: 40px; margin: 0.2rem; font-size: 0.8rem; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <!-- المرحلة 1: شاشة القفل السيادية -->
    <div id="vaultLock" class="card" style="max-width: 500px; margin: 5rem auto; text-align: center;">
        <h2 style="color: #D4AF37; margin-bottom: 1.5rem;">🔒 مركز العمليات المشفر</h2>
        <p style="margin-bottom: 1.5rem; color: #888;">أدخل شفرة العبور لفتح البوابة</p>
        <input type="password" id="vaultKey" placeholder="شفرة العبور السيادية..." style="text-align: center;">
        <button onclick="unlockVault()">فك التشفير</button>
    </div>

    <!-- المرحلة 2: تسجيل دخول Firebase -->
    <div id="loginPanel" class="card hidden" style="max-width: 500px; margin: 5rem auto;">
        <h2>🔐 دخول الإدارة السحابي</h2>
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="loginPassword" placeholder="كلمة المرور">
        <button id="doLoginBtn">تسجيل الدخول</button>
    </div>

    <!-- المرحلة 3: لوحة التحكم الكاملة -->
    <div id="adminPanel" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div class="logo">AWJ Admin</div>
            <button id="logoutBtn" style="background:#333; color:#eee;">تسجيل الخروج</button>
        </div>

        <!-- إدارة التبويبات والكتّاب -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="card">
                <h2>📁 التبويبات والفروع</h2>
                <div class="flex-row">
                    <input type="text" id="newCatName" placeholder="اسم التبويبة" style="flex:1;">
                    <button id="addCatBtn">إضافة</button>
                </div>
                <div id="catsList"></div>
            </div>
            <div class="card">
                <h2>✍️ الكتّاب</h2>
                <div class="flex-row">
                    <input type="text" id="newAuthorName" placeholder="اسم الكاتب" style="flex:1;">
                    <button id="addAuthorBtn">إضافة</button>
                </div>
                <div id="authorsList"></div>
            </div>
        </div>

        <!-- المحرر المتقدم -->
        <div class="card">
            <h2>📝 محرر المقال المتقدم</h2>
            <input type="text" id="articleTitle" placeholder="عنوان المقال">
            <div class="flex-row">
                <select id="authorSelect" style="flex:1"></select>
                <select id="catSelect" style="flex:1" onchange="updateSubSelect()"></select>
                <select id="subSelect" style="flex:1"></select>
            </div>
            <div id="blocksEditor"></div>
            <div class="flex-row" style="margin-top: 1rem;">
                <button onclick="addBlock('text')"><i class="fas fa-paragraph"></i> نص</button>
                <button onclick="addBlock('image')"><i class="fas fa-image"></i> صورة</button>
                <button onclick="addBlock('code')"><i class="fas fa-code"></i> كود</button>
            </div>
            <button id="publishBtn" style="width:100%; margin-top: 2rem; background: #D4AF37;">🚀 نشر المقال الملكي</button>
        </div>
    </div>
</div>

<script>
    // الإعدادات السيادية
    const MASTER_KEY = "@...Alshanfricc_1998...@";
    
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDjgVxvtPXTn1tpr4IxOK3wOW4r3gzB1VU",
        authDomain: "awj-website-29f16.firebaseapp.com",
        projectId: "awj-website-29f16",
        storageBucket: "awj-website-29f16.firebasestorage.app",
        appId: "1:406747568578:web:741821d3c60df0011b5e5b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // وظيفة فتح الخزنة الأولى
    function unlockVault() {
        const key = document.getElementById('vaultKey').value;
        if(key === MASTER_KEY) {
            document.getElementById('vaultLock').classList.add('hidden');
            document.getElementById('loginPanel').classList.remove('hidden');
        } else {
            alert("المكان يراقبك.. الشفرة خاطئة.");
        }
    }

    // منطق Firebase Login
    document.getElementById('doLoginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch(e) { alert("خطأ في الدخول: " + e.message); }
    };

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginPanel').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            loadData();
        }
    });

    document.getElementById('logoutBtn').onclick = () => auth.signOut();

    // وظائف الإدارة (مختصرة للدمج)
    async function loadData() {
        // تحميل التبويبات والكتّاب من Firestore
        const catSnap = await db.collection('categories').get();
        const authSnap = await db.collection('authors').get();
        // تحديث الواجهة هنا...
    }

    let blocks = [];
    function addBlock(type) {
        blocks.push({type, value: type === 'text' ? '' : {}});
        renderBlocks();
    }

    function renderBlocks() {
        const editor = document.getElementById('blocksEditor');
        editor.innerHTML = blocks.map((b, i) => `
            <div class="block">
                <small>${b.type.toUpperCase()}</small>
                <textarea onchange="blocks[${i}].value=this.value">${b.value}</textarea>
            </div>
        `).join('');
    }
</script>
</body>
</html>
