<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Hacker AI 👑💻 | Safe Mode & Auto-Rollback</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.css">
    <style>
        :root {
            --bg-void: #0d1117;
            --bg-terminal: #161b22;
            --bg-input: #0d1117;
            --text-green: #00ff41;
            --text-cyan: #00ffff;
            --text-amber: #f0a500;
            --text-red: #ff4d4d;
            --border-hacker: #30363d;
            --gold: #d4af37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-void);
            color: var(--text-green);
            font-family: 'Fira Code', 'Cairo', monospace;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: rgba(22, 27, 34, 0.9);
            border-bottom: 1px solid var(--border-hacker);
        }

        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.2rem; font-weight: 700; color: var(--gold); }

        .nav-links { display: flex; gap: 15px; }
        .nav-link {
            color: var(--text-green); text-decoration: none; font-size: 0.9rem;
            padding: 5px 10px; border: 1px solid transparent; transition: 0.3s;
        }
        .nav-link:hover, .nav-link.active { color: var(--bg-void); background: var(--text-green); }

        .container { display: flex; height: calc(100vh - 50px); }

        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .messages-container {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .message {
            padding: 12px 16px; border-radius: 4px; border-left: 3px solid;
            max-width: 90%; animation: fadeIn 0.3s ease;
        }
        .message.user { align-self: flex-end; background: rgba(212, 175, 55, 0.1); border-color: var(--gold); color: var(--gold); }
        .message.ai { align-self: flex-start; background: rgba(0, 255, 65, 0.05); border-color: var(--text-green); color: var(--text-green); }
        .message.error { border-color: var(--text-red); color: var(--text-red); background: rgba(255, 77, 77, 0.1); }
        .message pre { background: #000; padding: 10px; border-radius: 4px; overflow-x: auto; margin-top: 10px; }
        .message code { font-family: 'Fira Code', monospace; }

        .input-area {
            display: flex; padding: 15px; background: var(--bg-terminal);
            border-top: 1px solid var(--border-hacker); gap: 10px;
        }
        .prompt-sign { color: var(--text-green); font-weight: bold; display: flex; align-items: center; }
        .input-area textarea {
            flex: 1; background: transparent; border: none; color: var(--text-green);
            font-family: 'Fira Code', monospace; font-size: 1rem; resize: none; outline: none;
        }
        .btn-hacker {
            background: transparent; border: 1px solid var(--text-green); color: var(--text-green);
            padding: 8px 16px; cursor: pointer; font-family: 'Cairo', sans-serif; font-weight: bold; transition: 0.3s;
        }
        .btn-hacker:hover { background: var(--text-green); color: var(--bg-void); }
        .btn-hacker.danger { border-color: var(--text-red); color: var(--text-red); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-void); }
        ::-webkit-scrollbar-thumb { background: var(--text-green); }

        /* Status Bar */
        .status-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg-terminal); border-top: 1px solid var(--border-hacker);
            padding: 5px 15px; font-size: 0.8rem; color: var(--text-cyan);
            display: flex; justify-content: space-between; z-index: 999;
        }
        .status-bar .safe-mode { color: var(--text-amber); font-weight: bold; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <i data-lucide="shield-check"></i>
            <span>Royal Hacker AI // Safe Engine</span>
        </div>
        <nav class="nav-links">
            <a href="#" class="nav-link active" onclick="showPage('chat')">Terminal</a>
            <a href="#" class="nav-link" onclick="showPage('backups')">Backups</a>
            <a href="#" class="nav-link" onclick="showPage('settings')">Config</a>
        </nav>
    </header>

    <div class="container">
        <div class="chat-area">
            <div id="page-chat" class="page">
                <div class="messages-container" id="messagesContainer"></div>
                <div class="input-area">
                    <span class="prompt-sign">root@royal:~$ </span>
                    <textarea id="userInput" placeholder="اكتب أمرك... (تعديل: ...) أو (استعادة)" onkeydown="handleInput(event)"></textarea>
                    <button class="btn-hacker" onclick="sendMessage()">Execute</button>
                </div>
            </div>

            <div id="page-backups" class="page hidden" style="padding:20px; width:100%; overflow-y:auto;">
                <h2 style="color:var(--text-amber); margin-bottom:20px;">>_ System Backups (Auto-Safe)</h2>
                <button class="btn-hacker" onclick="createBackup()">Manual Backup</button>
                <div id="backupsList" style="margin-top:20px;"></div>
            </div>

            <div id="page-settings" class="page hidden" style="padding:20px; width:100%;">
                <h2 style="color:var(--text-amber); margin-bottom:20px;">>_ Configuration</h2>
                <div style="margin-bottom:20px;">
                    <label>API Key:</label>
                    <input type="text" id="apiKeyInput" style="width:100%; padding:10px; background:var(--bg-input); border:1px solid var(--border-hacker); color:var(--text-green); margin-top:5px;" placeholder="sk-or-v1-...">
                    <button class="btn-hacker" style="margin-top:10px;" onclick="saveApiKey()">Save</button>
                </div>
                <div style="margin-bottom:20px;">
                    <label>Model:</label>
                    <select id="modelSelect" style="width:100%; padding:10px; background:var(--bg-input); border:1px solid var(--border-hacker); color:var(--text-green); margin-top:5px;">
                        <option value="hy3/preview">Hy3 Preview (Me)</option>
                        <option value="deepseek/deepseek-chat">DeepSeek Coder</option>
                        <option value="openai/gpt-4o">GPT-4o</option>
                    </select>
                </div>
                <button class="btn-hacker" onclick="restoreLastGoodVersion()">Force Restore Last Safe Version</button>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span>Status: <span id="statusText">Idle</span></span>
        <span class="safe-mode" id="safeModeIndicator">● SAFE MODE</span>
        <span>Backups: <span id="backupCount">0</span></span>
    </div>

    <script>
        // ================= GLOBAL ERROR HANDLER (The Safety Net) =================
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('System Crash Detected:', msg);
            document.getElementById('statusText').innerText = 'CRASH DETECTED';
            
            // If we were trying to apply a new code, rollback immediately
            if (localStorage.getItem('royal_pending_code')) {
                alert(`⚠️ خطأ في الكود الجديد: ${msg}\nجاري استعادة النسخة المستقرة تلقائياً...`);
                localStorage.removeItem('royal_pending_code'); // Remove bad code
                // Restore the last known good backup
                restoreLastGoodVersion(true); // true means silent reload
            }
            return false;
        };

        // ================= CONFIGURATION =================
        let state = {
            messages: JSON.parse(localStorage.getItem('royal_msgs') || '[]'),
            apiKey: localStorage.getItem('royal_key') || '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',
            model: localStorage.getItem('royal_model') || 'hy3/preview',
            backups: JSON.parse(localStorage.getItem('royal_backups') || '[]')
        };

        // Check for Pending Code on Load
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            checkForUpdates();
            initApp();
        });

        function checkForUpdates() {
            const pendingCode = localStorage.getItem('royal_pending_code');
            if (pendingCode) {
                // We are loading after an update attempt.
                // If we reach here without an error (handled by window.onerror), the code is "Good".
                // So we move it from 'pending' to 'current' or just keep it as the new base.
                // For this demo, we assume the current running code is the result of the pending update.
                // We just clear the pending flag to mark success.
                localStorage.removeItem('royal_pending_code');
                addMessage('ai', '> System Update Successful. New code is now active.');
            }
        }

        function initApp() {
            document.getElementById('apiKeyInput').value = state.apiKey;
            document.getElementById('modelSelect').value = state.model;
            updateBackupCount();
            renderBackups();

            if (state.messages.length === 0) {
                addMessage('ai', '> System Ready.\n> Safe Mode: ON\n> Auto-Rollback: Enabled\n> Type "تعديل: [description]" to modify code safely.');
            } else {
                renderMessages();
            }
        }

        // ================= FUNCTIONS =================
        function saveState() {
            localStorage.setItem('royal_msgs', JSON.stringify(state.messages));
            localStorage.setItem('royal_key', state.apiKey);
            localStorage.setItem('royal_model', state.model);
            localStorage.setItem('royal_backups', JSON.stringify(state.backups));
        }

        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            state.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.role}`;
                div.innerHTML = formatCode(msg.content);
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function formatCode(text) {
            return text.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                      .replace(/\n/g, '<br>');
        }

        function addMessage(role, content) {
            state.messages.push({ role, content });
            saveState();
            renderMessages();
        }

        // ================= CHAT & EDITING =================
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';

            if (text.startsWith('تعديل:') || text.startsWith('عدل:') || text.startsWith('طور:')) {
                await handleCodeEdit(text);
            } else if (text.toLowerCase() === 'استعادة' || text.toLowerCase() === 'rollback') {
                restoreLastGoodVersion();
            } else {
                await handleChat(text);
            }
        }

        async function handleCodeEdit(instruction) {
            addMessage('ai', '> Initiating Safe Update Protocol...\n> Step 1: Creating Backup of current state.');
            createBackup(); // Always backup before trying changes

            addMessage('ai', '> Step 2: Contacting AI Coder (DeepSeek)...');
            
            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'deepseek/deepseek-chat', // Best for code
                        messages: [{
                            role: 'user',
                            content: `Modify the following HTML code based on instruction: "${instruction.replace('تعديل:', '')}".
                            Current Code:
                            \`\`\`html
                            ${document.documentElement.outerHTML.substring(0, 8000)}
                            \`\`\`
                            Output ONLY the full modified HTML code inside \`\`\`html ... \`\`\` blocks.`
                        }]
                    })
                });

                const data = await response.json();
                const newCodeRaw = data.choices[0].message.content;
                const match = newCodeRaw.match(/```html\n([\s\S]*?)```/);

                if (match && match[1]) {
                    const newCode = match[1];
                    addMessage('ai', '> Step 3: Code Received. Storing as PENDING...');
                    
                    // Store as "Pending" - Don't apply yet, just save to localStorage
                    localStorage.setItem('royal_pending_code', newCode);
                    
                    addMessage('ai', '> Step 4: Reloading to apply new code...\n> If crash occurs, Auto-Rollback will activate.');
                    
                    // Reload the page to apply the new code from localStorage
                    setTimeout(() => {
                        location.reload(); // This triggers checkForUpdates on load
                    }, 1500);
                } else {
                    addMessage('ai', 'Error: AI did not return valid code format.');
                }
            } catch (e) {
                addMessage('ai', `Error: ${e.message}`);
            }
        }

        // ================= BACKUP & ROLLBACK =================
        function createBackup() {
            const now = new Date();
            const timestamp = now.toISOString();
            const code = document.documentElement.outerHTML; // Current working code

            state.backups.push({
                id: timestamp,
                date: now.toLocaleString('ar-EG'),
                code: code
            });

            // Limit to 10
            if (state.backups.length > 10) {
                state.backups.shift();
            }

            saveState();
            updateBackupCount();
        }

        function restoreLastGoodVersion(silent = false) {
            if (state.backups.length === 0) {
                if (!silent) alert('No backups available!');
                return;
            }

            // Get the most recent backup
            const lastBackup = state.backups[state.backups.length - 1];
            
            if (!silent) {
                if (!confirm(`Restore version from ${lastBackup.date}?\nThis will replace current code.`)) return;
            }

            // Apply the backup code
            localStorage.setItem('royal_pending_code', lastBackup.code); // Use pending mechanism to reload
            if (!silent) addMessage('ai', '> Restoring last safe version...');
            
            setTimeout(() => {
                location.reload();
            }, 1000);
        }

        function updateBackupCount() {
            document.getElementById('backupCount').innerText = state.backups.length;
        }

        function renderBackups() {
            const list = document.getElementById('backupsList');
            list.innerHTML = '';
            if (state.backups.length === 0) { list.innerHTML = '<p>> No backups.</p>'; return; }
            
            // Show in reverse order (newest first)
            [...state.backups].reverse().forEach((b, i) => {
                const realIndex = state.backups.length - 1 - i;
                const div = document.createElement('div');
                div.style.cssText = 'padding:10px; border-bottom:1px solid var(--border-hacker); display:flex; justify-content:space-between;';
                div.innerHTML = `
                    <span>${b.date}</span>
                    <div>
                        <button class="btn-hacker" onclick="restoreSpecificBackup(${realIndex})">Restore</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function restoreSpecificBackup(index) {
            if (confirm('Apply this backup?')) {
                localStorage.setItem('royal_pending_code', state.backups[index].code);
                location.reload();
            }
        }

        // ================= UTILS =================
        function handleInput(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
        }
        function saveApiKey() {
            state.apiKey = document.getElementById('apiKeyInput').value;
            state.model = document.getElementById('modelSelect').value;
            saveState();
            alert('Saved!');
        }
        async function handleChat(text) {
            // Simple echo or API call
            addMessage('ai', `> Processing: ${text}\n[Note: Connect to Hy3/OpenRouter for real chat]`);
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.js"></script>
</body>
</html>
