### **كيف تستخدمه الآن؟**
1.  **كشريط بحث ذكي:** اكتب مثلاً "أنشئ لي زر إغلاق أحمر" واضغط **EXECUTE**. الذكاء الاصطناعي سيفهم الطلب، يولد الكود، ويضعه لك مباشرة في المحرر (`codeEditor`).
2.  **كأداة تعديل أكواد:** إذا كتبت كوداً كاملاً (مثل `<h1>Hello</h1>`) في شريط البحث وضغطت **EXECUTE**، سيعرف النظام أنه كود وسيقوم بتحديث المحرر فوراً.
3.  **نظام الرجوع:** أي تغيير يقوم به الذكاء الاصطناعي أو تقوم به أنت، يتم حفظ نسخة منه في القائمة الجانبية (`SYSTEM_HISTORY`). يمكنك الرجوع لأي نسخة بضغطة زر.
4.  **تفاعل الهكر:** ستظهر جميع العمليات في الكونسول الصغير بالأسفل باللون الأخضر للعمليات النظامية والأزرق لردود الذكاء الاصطناعي.
