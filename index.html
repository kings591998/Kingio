<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUAAD CORE | نظام التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #050505; color: #fff; overflow: hidden; height: 100vh; }
        .glass { background: rgba(15, 15, 15, 0.9); border: 1px solid #1a1a1a; }
        .active-tab { color: #fbbf24; border-bottom: 2px solid #fbbf24; }
        .nav-item { transition: 0.3s; cursor: pointer; }
        .nav-item:hover { color: #fbbf24; }
        .code-editor { background: #000; color: #00ff00; font-family: 'Courier New', monospace; }
        .msg-box { border-radius: 12px; padding: 10px 15px; margin-bottom: 10px; max-width: 80%; }
        .user-msg { background: #1e3a8a; align-self: flex-start; }
        .ai-msg { background: #1a1a1a; border: 1px solid #333; align-self: flex-end; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">

    <!-- Header -->
    <header class="p-4 border-b border-yellow-900/30 flex justify-between items-center bg-[#0a0a0a]">
        <div class="flex items-center gap-2">
            <i class="fas fa-microchip text-yellow-500"></i>
            <span class="font-bold tracking-widest text-sm">MUAAD_SYSTEM v5.0</span>
        </div>
        <div id="connection-status" class="text-[10px] text-green-500"><i class="fas fa-circle mr-1 text-[8px]"></i> متصل بالخادم</div>
    </header>

    <!-- Main Views -->
    <main class="flex-1 overflow-hidden relative">
        
        <!-- View 1: Chat & AI -->
        <section id="view-ai" class="absolute inset-0 flex flex-col p-4 space-y-4">
            <div class="flex-1 glass rounded-xl flex flex-col p-3 overflow-hidden">
                <div id="chat-container" class="flex-1 overflow-y-auto flex flex-col p-2 text-sm space-y-2">
                    <div class="ai-msg msg-box text-xs">نظام MUAAD جاهز. مفتاح API مفعل والربط حقيقي. كيف يمكنني مساعدتك برمجياً اليوم؟</div>
                </div>
            </div>
            <div class="flex gap-2">
                <input type="text" id="chat-input" placeholder="اطلب أي شيء من الذكاء الاصطناعي..." class="flex-1 bg-black border border-gray-800 p-3 rounded-lg outline-none text-sm focus:border-yellow-500">
                <button onclick="sendChatRequest()" id="send-btn" class="bg-yellow-600 text-black px-5 rounded-lg hover:bg-yellow-500 transition"><i class="fas fa-paper-plane"></i></button>
            </div>
        </section>

        <!-- View 2: Code Editor -->
        <section id="view-editor" class="absolute inset-0 hidden flex flex-col p-4 space-y-3">
            <div class="flex gap-2">
                <input type="text" id="ai-code-prompt" placeholder="أخبر الذكاء الاصطناعي بالتغيير المطلوب في الكود..." class="flex-1 bg-black border border-blue-900 p-2 rounded text-xs outline-none focus:border-blue-500">
                <button onclick="editCodeWithAI()" id="ai-edit-btn" class="bg-blue-600 text-white px-4 rounded text-[10px] font-bold">تعديل ذكي</button>
            </div>
            <textarea id="main-editor" class="flex-1 code-editor p-4 text-xs rounded border border-gray-800 outline-none resize-none" spellcheck="false"></textarea>
            <div class="flex gap-2">
                <button onclick="applyNewCode()" class="flex-1 bg-green-700 py-2 rounded text-[10px] font-bold">تثبيت الكود وتحديث الصفحة</button>
                <button onclick="copyCode()" class="bg-gray-800 px-4 py-2 rounded text-[10px]">نسخ</button>
            </div>
        </section>

        <!-- View 3: Settings -->
        <section id="view-settings" class="absolute inset-0 hidden p-6 overflow-y-auto">
            <div class="max-w-md mx-auto space-y-6">
                <div class="glass p-5 rounded-xl space-y-4">
                    <h3 class="text-yellow-500 font-bold border-b border-yellow-900/20 pb-2 text-sm">إعدادات الربط</h3>
                    <div>
                        <label class="text-[10px] text-gray-500 mb-1 block">مفتاح API Key</label>
                        <input type="password" id="api-key-input" value="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" class="w-full bg-black border border-gray-800 p-2 rounded text-xs text-yellow-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 mb-1 block">النموذج (Model)</label>
                        <select id="model-select" class="w-full bg-black border border-gray-800 p-2 rounded text-xs outline-none">
                            <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash (سريع)</option>
                            <option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
                            <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
                        </select>
                    </div>
                    <button onclick="saveSettings()" class="w-full bg-yellow-600 text-black py-2 rounded text-xs font-bold">حفظ الإعدادات</button>
                </div>
                <div class="glass p-5 rounded-xl">
                    <h3 class="text-red-500 font-bold border-b border-red-900/20 pb-2 text-sm">إدارة البيانات</h3>
                    <p class="text-[10px] text-gray-400 my-2">مسح الكاش والبيانات المحلية يعيد النظام لحالته الأصلية.</p>
                    <button onclick="localStorage.clear(); location.reload();" class="w-full border border-red-900/50 text-red-500 py-2 rounded text-xs hover:bg-red-900/10">إعادة ضبط المصنع</button>
                </div>
            </div>
        </section>

    </main>

    <!-- Navigation Bar -->
    <nav class="bg-[#0a0a0a] border-t border-yellow-900/20 flex justify-around py-3 shrink-0">
        <div onclick="switchTab('ai')" id="nav-ai" class="nav-item active-tab flex flex-col items-center gap-1">
            <i class="fas fa-robot text-lg"></i>
            <span class="text-[10px]">الذكاء الاصطناعي</span>
        </div>
        <div onclick="switchTab('editor')" id="nav-editor" class="nav-item flex flex-col items-center gap-1">
            <i class="fas fa-code text-lg"></i>
            <span class="text-[10px]">المحرر</span>
        </div>
        <div onclick="switchTab('settings')" id="nav-settings" class="nav-item flex flex-col items-center gap-1">
            <i class="fas fa-cog text-lg"></i>
            <span class="text-[10px]">الإعدادات</span>
        </div>
    </nav>

    <script>
        const API_KEY = "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";
        
        window.onload = () => {
            const savedKey = localStorage.getItem('user_api_key');
            if(savedKey) document.getElementById('api-key-input').value = savedKey;
            
            // تهيئة المحرر بكود الصفحة الحالي
            document.getElementById('main-editor').value = document.documentElement.outerHTML;

            // تفعيل Enter للإرسال
            document.getElementById('chat-input').onkeydown = (e) => { if(e.key === 'Enter') sendChatRequest(); };
        }

        function switchTab(tabId) {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav .nav-item').forEach(n => n.classList.remove('active-tab'));
            document.getElementById('view-' + tabId).classList.remove('hidden');
            document.getElementById('nav-' + tabId).classList.add('active-tab');
        }

        async function apiCall(prompt, systemPrompt) {
            const key = document.getElementById('api-key-input').value || API_KEY;
            const model = document.getElementById('model-select').value;
            
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: prompt }
                        ]
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error(error);
                return "خطأ: تعذر الاتصال بالذكاء الاصطناعي. تأكد من مفتاح الـ API.";
            }
        }

        async function sendChatRequest() {
            const input = document.getElementById('chat-input');
            const container = document.getElementById('chat-container');
            const msg = input.value.trim();
            if(!msg) return;

            // Add user message
            container.innerHTML += `<div class="user-msg msg-box text-xs">${msg}</div>`;
            input.value = '';
            container.scrollTop = container.scrollHeight;

            const btn = document.getElementById('send-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            const systemPrompt = "أنت مساعد ذكي للمستخدم معاذ. أجب باختصار واحترافية.";
            const reply = await apiCall(msg, systemPrompt);

            // Add AI response
            container.innerHTML += `<div class="ai-msg msg-box text-xs">${reply}</div>`;
            container.scrollTop = container.scrollHeight;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i>';
            btn.disabled = false;
        }

        async function editCodeWithAI() {
            const promptInput = document.getElementById('ai-code-prompt');
            const editor = document.getElementById('main-editor');
            const cmd = promptInput.value.trim();
            if(!cmd) return;

            const btn = document.getElementById('ai-edit-btn');
            btn.innerText = "جاري التعديل...";
            btn.disabled = true;

            const systemPrompt = "أنت خبير تطوير ويب. قم بتعديل الكود المصدري التالي بناءً على طلب المستخدم. أرجع الكود المحدث بالكامل فقط داخل وسم ```html.";
            const fullPrompt = `الكود الحالي:\n${editor.value}\n\nالتعديل المطلوب: ${cmd}`;

            const result = await apiCall(fullPrompt, systemPrompt);
            const codeMatch = result.match(/```html?([\s\S]*?)```/);
            
            if(codeMatch) {
                editor.value = codeMatch[1].trim();
                promptInput.value = '';
                alert("تم تعديل الكود في المحرر بنجاح.");
            } else {
                alert("تعذر استخراج كود صالح من الرد.");
            }

            btn.innerText = "تعديل ذكي";
            btn.disabled = false;
        }

        function applyNewCode() {
            const newCode = document.getElementById('main-editor').value;
            if(confirm("سيتم تطبيق الكود الجديد وتحديث الصفحة كلياً. استمر؟")) {
                document.open();
                document.write(newCode);
                document.close();
            }
        }

        function copyCode() {
            const editor = document.getElementById('main-editor');
            editor.select();
            document.execCommand('copy');
            alert("تم نسخ الكود للمحفظة.");
        }

        function saveSettings() {
            const key = document.getElementById('api-key-input').value;
            localStorage.setItem('user_api_key', key);
            alert("تم حفظ الإعدادات في المتصفح.");
        }
    </script>
</body>
</html>
