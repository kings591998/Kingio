    <script>
        // إدارة الحالة والنسخ الاحتياطية
        let backups = JSON.parse(localStorage.getItem('sys_backups')) || [];

        window.onload = () => {
            const savedKey = localStorage.getItem('api_key');
            if(savedKey) document.getElementById('apiKey').value = savedKey;
            
            // تهيئة المحرر بالكود الحالي
            document.getElementById('codeBox').value = document.documentElement.outerHTML;
            
            // تفعيل الإرسال بزر Enter
            document.getElementById('chatInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') handleChat();
            });
        };

        // تبديل الواجهات
        function switchTab(tabId) {
            document.querySelectorAll('section').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            document.getElementById(`view-${tabId}`).classList.add('flex');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        // حفظ الإعدادات
        function saveSettings() {
            localStorage.setItem('api_key', document.getElementById('apiKey').value);
            alert("تم حفظ الإعدادات بنجاح.");
        }

        function toggleLoading(show) {
            document.getElementById('loadingIndicator').style.display = show ? 'block' : 'none';
        }

        // دالة الاتصال بـ OpenRouter (الأساسية)
        async function fetchAI(prompt, systemRole) {
            const key = document.getElementById('apiKey').value;
            const model = document.getElementById('modelSelect').value;
            
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": model,
                        "messages": [
                            {"role": "system", "content": systemRole},
                            {"role": "user", "content": prompt}
                        ]
                    })
                });
                
                const data = await response.json();
                if(data.error) throw new Error(data.error.message);
                return data.choices[0].message.content;
            } catch (err) {
                return `[خطأ في النظام]: ${err.message || "تأكد من صحة المفتاح والاتصال بالإنترنت"}`;
            }
        }

        // معالجة الدردشة
        async function handleChat() {
            const inputEl = document.getElementById('chatInput');
            const msg = inputEl.value.trim();
            if(!msg) return;

            addChatMsg(msg, 'user');
            inputEl.value = '';
            toggleLoading(true);

            const sysRole = "أنت مساعد ذكي للمستخدم 'معاذ'. أجب باختصار، دقة، واحترافية عالية باللغة العربية.";
            const reply = await fetchAI(msg, sysRole);
            
            addChatMsg(reply, 'ai');
            toggleLoading(false);
        }

        function addChatMsg(text, type) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            
            if(type === 'user') {
                div.className = "bg-teal-900/30 p-3 rounded-xl rounded-tl-none self-end max-w-[85%] border border-teal-800/50 text-sm text-teal-50";
            } else {
                div.className = "bg-gray-800/50 p-3 rounded-xl rounded-tr-none self-start max-w-[85%] border border-gray-700 text-sm";
            }
            
            // تحويل علامات الكود إلى تنسيق بسيط إن وجدت
            const formattedText = text.replace(/```([\s\S]*?)```/g, '<pre class="bg-black text-xs text-green-400 p-2 rounded mt-2 overflow-x-auto">$1</pre>');
            div.innerHTML = formattedText;
            
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
