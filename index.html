<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شنفر | منصة المعرفة الذكية</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>:root{--bg:#0A0B10;--card:#12141E;--border:#2a2a35;--text:#eee;--acc:#D4AF37}*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui} body{background:var(--bg);color:var(--text);direction:rtl;padding:1rem} header{text-align:center;padding:2rem 0} h1{color:var(--acc);margin-bottom:0.5rem} .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;margin-top:2rem} .card{background:var(--card);border:1px solid var(--border);padding:1rem;border-radius:1rem} .badge{background:rgba(212,175,55,0.2);color:var(--acc);padding:0.2rem 0.5rem;border-radius:0.5rem;font-size:0.8rem}</style>
</head>
<body>
<header>
    <h1>🤖 شنفر | مقالات ذكية</h1>
    <p style="color:#aaa;">منصة المعرفة المتقدمة</p>
</header>
<div class="grid" id="shanfarGrid"></div>

<script src="firebase-config.js"></script>
<script src="security-shield.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    db.collection('articles').where('category','==','شنفر').orderBy('date','desc').limit(6).get().then(snap=>{
        const g=document.getElementById('shanfarGrid');
        if(snap.empty){g.innerHTML='<p style="color:#aaa;text-align:center;grid-column:1/-1">جاري تحضير المقالات الأولى...</p>';return;}
        g.innerHTML=snap.docs.map(d=>{
            const a=d.data();
            const p=a.contentBlocks.find(b=>b.type==='summary')?.value||'';
            return `<div class="card"><h3 style="margin-bottom:0.5rem">${a.title}</h3><p style="color:#aaa;font-size:0.9rem;margin-bottom:0.5rem">${p}</p><span class="badge">توليد ذكي</span></div>`;
        }).join('');
    });
});
</script>
</body>
</html>
