<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شنفر | منصة المحتوى السيادي الذكي</title>
    <meta name="description" content="منصة شنفر للمحتوى العربي المتميز - مقالات، أكواد، وشروحات تقنية مدعومة بالذكاء الاصطناعي">
    <meta property="og:title" content="شنفر | منصة المحتوى السيادي">
    <meta property="og:description" content="مقالات احترافية، توليد ذكي، وتجربة قراءة فريدة">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg: #0A0B10; --bg-sec: #0C0F17; --card: #12141E; --border: #2a2a35;
            --text: #eee; --text-m: #aaa; --acc: #D4AF37; --rad: 1rem;
        }
        [data-theme="light"] { --bg:#f8f9fa; --bg-sec:#fff; --card:#fff; --border:#dee2e6; --text:#212529; --text-m:#6c757d; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui; }
        body { background:var(--bg); color:var(--text); direction:rtl; line-height:1.8; min-height:100vh; }
        header { text-align:center; padding:2rem 1rem; border-bottom:1px solid var(--border); position:relative; }
        .logo { display:flex; align-items:center; justify-content:center; gap:1rem; margin-bottom:1rem; }
        .logo-icon { width:60px; height:60px; position:relative; }
        .logo-icon .ring { position:absolute; inset:0; border:2px dashed var(--acc); border-radius:50%; animation:spin 20s linear infinite; }
        .logo-icon .ring::before { content:"✦✧✦✧"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--acc); font-size:0.8rem; letter-spacing:4px; }
        .logo-icon svg { width:100%; filter:drop-shadow(0 0 10px rgba(212,175,55,0.4)); }
        @keyframes spin { to { transform:rotate(360deg); } }
        h1 { color:var(--acc); font-size:2.2rem; }
        .sub { color:var(--text-m); margin:0.5rem 0 1.5rem; }
        .controls { display:flex; gap:0.8rem; justify-content:center; flex-wrap:wrap; margin-bottom:2rem; }
        .controls input, .controls select { padding:0.6rem 1rem; background:var(--bg-sec); border:1px solid var(--border); border-radius:var(--rad); color:var(--text); }
        .controls button { padding:0.6rem 1.2rem; background:var(--acc); color:#000; border:none; border-radius:var(--rad); cursor:pointer; font-weight:bold; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:1.5rem; max-width:1200px; margin:0 auto 3rem; padding:0 1rem; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:var(--rad); padding:1.5rem; transition:0.3s; cursor:pointer; }
        .card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,0.4); border-color:var(--acc); }
        .card h3 { color:var(--acc); margin-bottom:0.5rem; }
        .meta { display:flex; gap:1rem; color:var(--text-m); font-size:0.85rem; margin:0.5rem 0; }
        .preview { color:var(--text-m); line-height:1.6; margin-top:0.5rem; }
        .badge { display:inline-block; padding:0.2rem 0.6rem; background:rgba(212,175,55,0.2); color:var(--acc); border-radius:40px; font-size:0.75rem; margin-top:0.5rem; }
        .modal { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; padding:1rem; opacity:0; visibility:hidden; transition:0.3s; z-index:1000; }
        .modal.active { opacity:1; visibility:visible; }
        .modal-content { background:var(--card); border:1px solid var(--border); border-radius:var(--rad); width:100%; max-width:800px; max-height:90vh; overflow-y:auto; padding:2rem; position:relative; }
        .close { position:absolute; top:1rem; left:1rem; background:none; border:none; color:var(--text-m); font-size:1.5rem; cursor:pointer; }
        .close:hover { color:var(--acc); }
        .article h1 { border-right:4px solid var(--acc); padding-right:1rem; margin-bottom:1rem; }
        .block { margin:1.5rem 0; }
        .block.text { font-size:1.1rem; line-height:2; }
        .block.code pre { background:#0D0F14; padding:1rem; border-radius:0.8rem; overflow-x:auto; direction:ltr; }
        .block.quote { background:var(--bg-sec); border-right:3px solid var(--acc); padding:1rem; border-radius:0 0.5rem 0.5rem 0; font-style:italic; }
        footer { text-align:center; padding:2rem; border-top:1px solid var(--border); color:var(--text-m); margin-top:3rem; }
        .toast { position:fixed; bottom:1rem; left:1rem; padding:0.8rem 1.2rem; background:var(--acc); color:#000; border-radius:var(--rad); font-weight:500; transform:translateY(150%); transition:0.3s; z-index:2000; }
        .toast.show { transform:translateY(0); }
        @media(max-width:768px) { .grid{grid-template-columns:1fr} h1{font-size:1.6rem} }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">
                <div class="ring"></div>
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 10 L65 40 L90 45 L70 60 L75 90 L50 75 L25 90 L30 60 L10 45 L35 40 Z" fill="#D4AF37" stroke="#fff" stroke-width="2"/><circle cx="45" cy="35" r="3" fill="#0A0B10"/><circle cx="55" cy="35" r="3" fill="#0A0B10"/></svg>
            </div>
        </div>
        <h1>🦅 شنفر</h1>
        <p class="sub">منصة المحتوى السيادي الذكي</p>
        <div class="controls">
            <button id="themeToggle" style="background:transparent;border:1px solid var(--border);color:var(--text)"><i class="fas fa-moon"></i></button>
            <input type="text" id="searchInput" placeholder="🔍 ابحث في المقالات..." style="min-width:250px">
            <select id="catFilter"><option value="">جميع الأقسام</option></select>
            <select id="subFilter"><option value="">جميع الفروع</option></select>
            <button onclick="applyFilters()">تطبيق</button>
        </div>
    </header>

    <main class="grid" id="articlesGrid"></main>
    <div id="shanfarSection" style="max-width:1200px;margin:0 auto 2rem;padding:0 1rem;display:none;">
        <h2 style="color:var(--acc);border-right:4px solid var(--acc);padding-right:1rem;margin-bottom:1rem;">🤖 شنفر AI | مقالات مولدة</h2>
        <div class="grid" id="aiGrid"></div>
    </div>

    <div class="modal" id="articleModal">
        <div class="modal-content">
            <button class="close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <article class="article" id="articleContent"></article>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <footer>© 2024 شنفر. جميع الحقوق محفوظة. | مدعوم بالذكاء الاصطناعي</footer>

    <script>
    const firebaseConfig = {
        apiKey:"AIzaSyDjgVxvtPXTn1tpr4IxOK3wOW4r3gzB1VU",authDomain:"awj-website-29f16.firebaseapp.com",projectId:"awj-website-29f16",storageBucket:"awj-website-29f16.firebasestorage.app",messagingSenderId:"406747568578",appId:"1:406747568578:web:741821d3c60df0011b5e5b"
    };
    if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let allArticles = [], filtered = [];

    // 🛡️ حماية بسيطة
    document.addEventListener('contextmenu', e=>e.preventDefault());
    document.addEventListener('keydown', e=>{if((e.ctrlKey&&['u','s'].includes(e.key))||e.key==='F12')e.preventDefault();});

    // 🌙 تبديل الوضع
    const themeBtn = document.getElementById('themeToggle');
    themeBtn.onclick = () => {
        const isDark = document.documentElement.getAttribute('data-theme')!=='light';
        document.documentElement.setAttribute('data-theme', isDark?'light':'dark');
        themeBtn.innerHTML = isDark?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';
        localStorage.setItem('theme', isDark?'light':'dark');
    };
    if(localStorage.getItem('theme')==='light') themeBtn.click();

    // 📦 تحميل البيانات
    async function loadData() {
        const [artsSnap, catsSnap] = await Promise.all([db.collection('articles').orderBy('date','desc').get(), db.collection('categories').orderBy('name').get()]);
        allArticles = artsSnap.docs.map(d=>({id:d.id,...d.data()}));
        const cats = catsSnap.docs.map(d=>d.data());
        document.getElementById('catFilter').innerHTML = '<option value="">جميع الأقسام</option>' + cats.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
        document.getElementById('catFilter').onchange = e => {
            const subSel = document.getElementById('subFilter');
            const cat = cats.find(c=>c.name===e.target.value);
            subSel.innerHTML = '<option value="">جميع الفروع</option>' + (cat?.subfields?.map(s=>`<option value="${s}">${s}</option>`).join('')||'');
        };
        render(allArticles);
        loadAI();
    }

    function render(list) {
        const grid = document.getElementById('articlesGrid');
        if(!list.length) { grid.innerHTML='<div class="card" style="text-align:center;grid-column:1/-1">لا توجد مقالات</div>'; return; }
        grid.innerHTML = list.map(a => {
            const preview = a.contentBlocks?.find(b=>b.type==='summary')?.value || a.contentBlocks?.find(b=>b.type==='text')?.value?.replace(/<[^>]+>/g,'').slice(0,100)+'...' || '';
            const readTime = Math.max(1, Math.ceil((a.contentBlocks?.join(' ')||'').split(/\s+/).filter(w=>w).length / 200));
            return `<div class="card" onclick="openArticle('${a.id}')">
                <h3>${escape(a.title)}</h3>
                <div class="meta"><span><i class="fas fa-user"></i> ${escape(a.author)}</span><span><i class="fas fa-folder"></i> ${escape(a.category)}</span><span><i class="fas fa-clock"></i> ${readTime} د</span></div>
                <div class="preview">${escape(preview)}</div>
                ${a.isAutoGenerated?'<span class="badge">🤖 AI</span>':''}
            </div>`;
        }).join('');
    }

    function applyFilters() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const c = document.getElementById('catFilter').value;
        const s = document.getElementById('subFilter').value;
        filtered = allArticles.filter(a => (!q || (a.title||'').toLowerCase().includes(q) || (a.author||'').toLowerCase().includes(q)) && (!c || a.category===c) && (!s || a.subfield===s));
        render(filtered);
    }
    document.getElementById('searchInput').oninput = applyFilters;

    async function openArticle(id) {
        const doc = await db.collection('articles').doc(id).get();
        if(!doc.exists) return showToast('❌ المقال غير موجود','error');
        const a = {id:doc.id,...doc.data()};
        db.collection('articles').doc(id).update({views:firebase.firestore.FieldValue.increment(1)});
        const content = document.getElementById('articleContent');
        content.innerHTML = `<h1>${escape(a.title)}</h1><div class="meta"><span>${a.author}</span><span>${a.category} / ${a.subfield}</span><span>👁️ ${a.views||0}</span></div>` + 
            (a.contentBlocks||[]).map(b => {
                if(b.type==='text') return `<div class="block text">${b.value}</div>`;
                if(b.type==='code') return `<div class="block code"><pre><code class="language-${b.value.language||'javascript'}">${escape(b.value.code)}</code></pre></div>`;
                if(b.type==='image') return `<div class="block"><img src="${b.value.url}" style="max-width:100%;border-radius:0.5rem"><p style="text-align:center;color:var(--text-m);font-size:0.9rem">${escape(b.value.caption)}</p></div>`;
                if(b.type==='summary') return `<div class="block quote">💡 ${escape(b.value)}</div>`;
                return '';
            }).join('');
        document.querySelectorAll('.modal-content code').forEach(el => hljs.highlightElement(el));
        document.getElementById('articleModal').classList.add('active');
        document.body.style.overflow='hidden';
    }
    window.closeModal = () => { document.getElementById('articleModal').classList.remove('active'); document.body.style.overflow=''; };
    
    async function loadAI() {
        const snap = await db.collection('articles').where('isAutoGenerated','==',true).orderBy('date','desc').limit(4).get();
        if(snap.empty) return;
        document.getElementById('shanfarSection').style.display='block';
        document.getElementById('aiGrid').innerHTML = snap.docs.map(d=>{
            const a=d.data(); const p=a.contentBlocks?.find(b=>b.type==='summary')?.value||'';
            return `<div class="card" onclick="openArticle('${d.id}')"><h3>${escape(a.title)}</h3><div class="preview">${escape(p)}</div><span class="badge">🤖 AI</span></div>`;
        }).join('');
    }

    function showToast(msg, type='info') { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'; setTimeout(()=>t.classList.remove('show'),3000); }
    function escape(s) { return s?s.replace(/[&<>]/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])):''; }

    // دعم الروابط المباشرة
    window.onload = () => {
        const p = new URLSearchParams(location.search).get('article');
        if(p) openArticle(p);
        loadData().catch(()=>showToast('⚠️ تأكد من اتصال الإنترنت','error'));
    };
    </script>
</body>
</html>
