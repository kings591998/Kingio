<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUAAD SMART HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        :root {
            --primary-blue: #1e3a8a;
            --accent-gold: #fbbf24;
            --dark-bg: #050505;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .active-tab {
            color: var(--accent-gold);
            border-top: 3px solid var(--accent-gold);
            background: linear-gradient(to bottom, rgba(251, 191, 36, 0.1), transparent);
        }

        .chat-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .user-bubble {
            background: var(--primary-blue);
            align-self: flex-start;
            border-bottom-right-radius: 2px;
        }

        .ai-bubble {
            background: #1a1a1a;
            border: 1px solid #333;
            align-self: flex-end;
            border-bottom-left-radius: 2px;
        }

        .code-area {
            background: #000;
            color: #10b981;
            font-family: 'Courier New', monospace;
            scrollbar-width: thin;
        }

        .loader {
            width: 12px;
            height: 12px;
            border: 2px solid #fff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent-gold); }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-4 glass-panel border-b border-white/10 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-amber-500 rounded flex items-center justify-center text-black shadow-lg">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1 class="font-bold text-sm tracking-widest text-amber-500 uppercase">Muaad_System_v5</h1>
        </div>
        <div id="status-indicator" class="flex items-center gap-2 text-[10px] text-green-500 font-bold">
            <span class="flex h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
            CONNECTED
        </div>
    </header>

    <!-- Content -->
    <main class="flex-1 relative overflow-hidden bg-[#080808]">
        
        <!-- View: Chat (AI) -->
        <section id="view-chat" class="absolute inset-0 flex flex-col p-4 space-y-4">
            <div id="chat-logs" class="flex-1 overflow-y-auto flex flex-col space-y-2 p-2">
                <div class="ai-bubble chat-bubble">
                    مرحباً يا معاذ. الواجهة الزرقاء والذهبية عادت، والنظام مرتبط الآن بـ OpenRouter. كيف يمكنني مساعدتك؟
                </div>
            </div>
            <div class="flex gap-2 shrink-0 bg-black/50 p-2 rounded-2xl border border-white/5">
                <input type="text" id="user-input" placeholder="اطلب أي شيء من الذكاء الاصطناعي..." class="flex-1 bg-transparent px-4 py-3 outline-none text-sm">
                <button onclick="System.sendChat()" id="send-btn" class="bg-amber-500 text-black w-12 h-12 rounded-xl flex items-center justify-center hover:scale-105 transition-transform shadow-lg shadow-amber-500/20">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </section>

        <!-- View: Editor -->
        <section id="view-editor" class="absolute inset-0 hidden flex flex-col p-4 space-y-3">
            <div class="flex gap-2 shrink-0">
                <input type="text" id="ai-code-prompt" placeholder="أمر تعديل الكود (مثلاً: غير لون الخلفية)..." class="flex-1 bg-black border border-blue-900/50 p-3 rounded-lg text-xs outline-none focus:border-amber-500 transition-all">
                <button onclick="System.modifyCode()" id="modify-btn" class="bg-blue-600 px-5 rounded-lg text-[11px] font-bold">تعديل</button>
            </div>
            <textarea id="main-editor" class="flex-1 code-area p-4 text-xs rounded-lg border border-white/5 outline-none resize-none" spellcheck="false"></textarea>
            <div class="flex gap-2 shrink-0">
                <button onclick="System.deploy()" class="flex-1 bg-amber-600 text-black py-3 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">تحديث وتثبيت النظام</button>
                <button onclick="System.copy()" class="bg-zinc-800 px-5 rounded-xl text-amber-500"><i class="fas fa-copy"></i></button>
            </div>
        </section>

        <!-- View: Settings -->
        <section id="view-settings" class="absolute inset-0 hidden p-6 overflow-y-auto">
            <div class="max-w-md mx-auto space-y-6">
                <div class="glass-panel p-6 rounded-3xl space-y-5">
                    <h3 class="text-amber-500 font-bold flex items-center gap-2 border-b border-white/5 pb-3">
                        <i class="fas fa-key"></i> إعدادات المفتاح
                    </h3>
                    <div class="space-y-2">
                        <label class="text-[10px] text-zinc-500 uppercase font-bold px-1">OpenRouter API Key</label>
                        <input type="text" id="api-key-input" value="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" class="w-full bg-black border border-white/10 p-3 rounded-xl text-xs text-amber-400 outline-none focus:border-amber-500">
                    </div>
                    <button onclick="System.saveSettings()" class="w-full bg-amber-500 text-black font-bold py-3 rounded-xl text-xs shadow-lg">حفظ الإعدادات</button>
                </div>

                <div class="glass-panel p-6 rounded-3xl space-y-3">
                    <h3 class="text-red-500 font-bold flex items-center gap-2 text-sm"><i class="fas fa-exclamation-triangle"></i> التحكم بالنظام</h3>
                    <button onclick="localStorage.clear(); location.reload();" class="w-full border border-red-900/30 text-red-500 py-3 rounded-xl text-[10px] font-bold hover:bg-red-900/10">إعادة ضبط المصنع (حذف الكاش)</button>
                </div>
            </div>
        </section>

    </main>

    <!-- Navigation -->
    <nav class="glass-panel border-t border-white/5 flex justify-around items-center shrink-0 h-20 px-2 pb-2">
        <button onclick="System.switch('chat')" id="nav-chat" class="active-tab flex-1 flex flex-col items-center justify-center gap-1 transition-all h-full">
            <i class="fas fa-robot text-xl"></i><span class="text-[10px] font-bold">الذكاء</span>
        </button>
        <button onclick="System.switch('editor')" id="nav-editor" class="flex-1 flex flex-col items-center justify-center gap-1 transition-all h-full">
            <i class="fas fa-code-branch text-xl"></i><span class="text-[10px] font-bold">المحرر</span>
        </button>
        <button onclick="System.switch('settings')" id="nav-settings" class="flex-1 flex flex-col items-center justify-center gap-1 transition-all h-full">
            <i class="fas fa-user-cog text-xl"></i><span class="text-[10px] font-bold">الإعدادات</span>
        </button>
    </nav>

    <script>
        const System = {
            // مفتاحك الافتراضي
            DEFAULT_KEY: "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",

            init() {
                const savedKey = localStorage.getItem('muaad_api_key');
                if(savedKey) document.getElementById('api-key-input').value = savedKey;
                document.getElementById('main-editor').value = document.documentElement.outerHTML;
                
                // تفعيل Enter للإرسال
                document.getElementById('user-input').onkeydown = (e) => { if(e.key === 'Enter') this.sendChat(); };
            },

            switch(tab) {
                document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
                document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
                document.getElementById('view-' + tab).classList.remove('hidden');
                document.getElementById('nav-' + tab).classList.add('active-tab');
            },

            async callOpenRouter(prompt, systemMsg) {
                const apiKey = document.getElementById('api-key-input').value || this.DEFAULT_KEY;
                try {
                    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${apiKey}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            model: "google/gemini-2.0-flash-001",
                            messages: [
                                { role: "system", content: systemMsg },
                                { role: "user", content: prompt }
                            ]
                        })
                    });
                    const data = await res.json();
                    if(data.error) throw new Error(data.error.message);
                    return data.choices[0].message.content;
                } catch (err) {
                    console.error(err);
                    return "ERROR: " + err.message;
                }
            },

            async sendChat() {
                const input = document.getElementById('user-input');
                const log = document.getElementById('chat-logs');
                const text = input.value.trim();
                if(!text) return;

                log.innerHTML += `<div class="user-bubble chat-bubble">${text}</div>`;
                input.value = '';
                log.scrollTop = log.scrollHeight;

                const btn = document.getElementById('send-btn');
                btn.innerHTML = '<span class="loader"></span>';
                btn.disabled = true;

                const reply = await this.callOpenRouter(text, "أنت مساعد ذكي للمستخدم معاذ. أجب باللغة العربية باختصار.");
                
                log.innerHTML += `<div class="ai-bubble chat-bubble">${reply}</div>`;
                log.scrollTop = log.scrollHeight;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                btn.disabled = false;
            },

            async modifyCode() {
                const prompt = document.getElementById('ai-code-prompt').value.trim();
                const editor = document.getElementById('main-editor');
                if(!prompt) return;

                const btn = document.getElementById('modify-btn');
                btn.innerText = "...";
                btn.disabled = true;

                const sysPrompt = "أنت خبير تطوير ويب. عدل الكود التالي بناءً على طلب المستخدم وأرجع الكود الكامل فقط داخل ```html.";
                const result = await this.callOpenRouter(`الكود:\n${editor.value}\n\nالمطلوب: ${prompt}`, sysPrompt);
                
                const match = result.match(/```html?([\s\S]*?)```/);
                if(match) {
                    editor.value = match[1].trim();
                    alert("تم تحديث الكود في المحرر. اضغط على زر التثبيت لتفعيل التغييرات.");
                } else {
                    alert("تعذر استخراج كود. جرب وصفاً أدق.");
                }

                btn.innerText = "تعديل";
                btn.disabled = false;
            },

            deploy() {
                if(confirm("هل تريد تثبيت التعديلات الجديدة وإعادة تشغيل النظام؟")) {
                    const newCode = document.getElementById('main-editor').value;
                    document.open();
                    document.write(newCode);
                    document.close();
                }
            },

            copy() {
                const area = document.getElementById('main-editor');
                area.select();
                document.execCommand('copy');
                alert("تم النسخ!");
            },

            saveSettings() {
                const key = document.getElementById('api-key-input').value;
                localStorage.setItem('muaad_api_key', key);
                alert("تم حفظ مفتاح API في ذاكرة المتصفح.");
            }
        };

        System.init();
    </script>
</body>
</html>
