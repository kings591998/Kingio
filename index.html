<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUAAD CORE | نظام التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #050505; color: #fff; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }
        .glass { background: rgba(20, 20, 20, 0.95); border: 1px solid #222; }
        .active-tab { color: #fbbf24; border-bottom: 2px solid #fbbf24; background: rgba(251, 191, 36, 0.05); }
        .code-editor { background: #000; color: #00ff00; font-family: 'Courier New', monospace; scrollbar-width: thin; }
        .msg-box { border-radius: 12px; padding: 10px 15px; margin-bottom: 10px; max-width: 85%; font-size: 13px; line-height: 1.6; }
        .user-msg { background: #1e3a8a; align-self: flex-start; border-bottom-right-radius: 2px; }
        .ai-msg { background: #1a1a1a; border: 1px solid #333; align-self: flex-end; border-bottom-left-radius: 2px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-4 border-b border-yellow-900/30 flex justify-between items-center bg-[#0a0a0a] shrink-0">
        <div class="flex items-center gap-2">
            <i class="fas fa-bolt text-yellow-500"></i>
            <span class="font-bold tracking-tighter text-sm uppercase">Muaad_Control_v5</span>
        </div>
        <div id="status-tag" class="text-[10px] text-green-500 flex items-center gap-1">
            <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span>
            ACTIVE
        </div>
    </header>

    <!-- Content Area -->
    <main class="flex-1 overflow-hidden relative">
        
        <!-- View AI -->
        <section id="view-ai" class="absolute inset-0 flex flex-col p-3 space-y-3">
            <div id="chat-container" class="flex-1 glass rounded-xl flex flex-col p-4 overflow-y-auto space-y-3">
                <div class="ai-msg msg-box">أهلاً يا معاذ، النظام متصل الآن. جميع الأزرار تم إصلاحها والربط حقيقي. ماذا سنفعل اليوم؟</div>
            </div>
            <div class="flex gap-2 shrink-0">
                <input type="text" id="chat-input" placeholder="اكتب هنا..." class="flex-1 bg-black border border-gray-800 p-3 rounded-xl outline-none text-sm focus:border-yellow-500 transition-all">
                <button id="btn-send-chat" class="bg-yellow-600 text-black w-12 h-12 rounded-xl hover:bg-yellow-500 transition-all flex items-center justify-center shadow-lg"><i class="fas fa-paper-plane"></i></button>
            </div>
        </section>

        <!-- View Editor -->
        <section id="view-editor" class="absolute inset-0 hidden flex flex-col p-3 space-y-2">
            <div class="flex gap-2 shrink-0">
                <input type="text" id="ai-prompt-code" placeholder="أمر التعديل الذكي..." class="flex-1 bg-black border border-blue-900 p-2 rounded-lg text-xs outline-none focus:border-blue-400">
                <button id="btn-ai-modify" class="bg-blue-600 text-white px-4 rounded-lg text-[10px] font-bold">توليد</button>
            </div>
            <textarea id="code-area" class="flex-1 code-editor p-3 text-[11px] rounded-lg border border-gray-800 outline-none resize-none" spellcheck="false"></textarea>
            <div class="flex gap-2 shrink-0">
                <button id="btn-apply-code" class="flex-1 bg-green-700 py-3 rounded-lg text-[11px] font-bold uppercase tracking-wider">Deploy_Changes</button>
                <button id="btn-copy-code" class="bg-gray-800 px-5 rounded-lg text-xs"><i class="fas fa-copy"></i></button>
            </div>
        </section>

        <!-- View Settings -->
        <section id="view-settings" class="absolute inset-0 hidden p-5 overflow-y-auto">
            <div class="space-y-4">
                <div class="glass p-5 rounded-2xl space-y-4">
                    <h3 class="text-yellow-500 font-bold text-xs uppercase border-b border-gray-800 pb-2">API_Configuration</h3>
                    <div>
                        <label class="text-[10px] text-gray-500 mb-1 block">OpenRouter Key</label>
                        <input type="password" id="api-key-val" value="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" class="w-full bg-black border border-gray-800 p-3 rounded-lg text-xs text-yellow-500 outline-none">
                    </div>
                    <button id="btn-save-settings" class="w-full bg-yellow-600 text-black py-2 rounded-lg text-xs font-bold">حفظ التغييرات</button>
                </div>
                <button id="btn-reset" class="w-full border border-red-900/40 text-red-500 py-3 rounded-lg text-xs hover:bg-red-950/20 transition-all">إعادة ضبط النظام</button>
            </div>
        </section>

    </main>

    <!-- Bottom Nav -->
    <nav class="bg-[#0a0a0a] border-t border-white/5 flex justify-around py-2 shrink-0 h-16">
        <button id="nav-btn-ai" class="nav-item active-tab flex-1 flex flex-col items-center justify-center gap-1 transition-all"><i class="fas fa-robot text-lg"></i><span class="text-[9px]">الذكاء الاصطناعي</span></button>
        <button id="nav-btn-editor" class="nav-item flex-1 flex flex-col items-center justify-center gap-1 transition-all"><i class="fas fa-code text-lg"></i><span class="text-[9px]">المحرر</span></button>
        <button id="nav-btn-settings" class="nav-item flex-1 flex flex-col items-center justify-center gap-1 transition-all"><i class="fas fa-cog text-lg"></i><span class="text-[9px]">الإعدادات</span></button>
    </nav>

    <script>
        // التكوين الافتراضي
        const DEFAULT_API_KEY = "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";

        // المحرك الأساسي
        const System = {
            init() {
                this.bindEvents();
                this.loadSettings();
                document.getElementById('code-area').value = document.documentElement.outerHTML;
            },

            bindEvents() {
                // تبديل النوافذ
                document.getElementById('nav-btn-ai').onclick = () => this.switchTab('ai');
                document.getElementById('nav-btn-editor').onclick = () => this.switchTab('editor');
                document.getElementById('nav-btn-settings').onclick = () => this.switchTab('settings');

                // الدردشة
                document.getElementById('btn-send-chat').onclick = () => this.handleChat();
                document.getElementById('chat-input').onkeypress = (e) => { if(e.key === 'Enter') this.handleChat(); };

                // المحرر
                document.getElementById('btn-ai-modify').onclick = () => this.handleCodeModify();
                document.getElementById('btn-apply-code').onclick = () => this.applyCode();
                document.getElementById('btn-copy-code').onclick = () => this.copyCode();

                // الإعدادات
                document.getElementById('btn-save-settings').onclick = () => this.saveSettings();
                document.getElementById('btn-reset').onclick = () => { localStorage.clear(); location.reload(); };
            },

            switchTab(id) {
                document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
                document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
                document.getElementById(`view-${id}`).classList.remove('hidden');
                document.getElementById(`nav-btn-${id}`).classList.add('active-tab');
            },

            async callAI(prompt, system) {
                const key = localStorage.getItem('muaad_key') || DEFAULT_API_KEY;
                try {
                    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: "google/gemini-2.0-flash-001",
                            messages: [{ role: "system", content: system }, { role: "user", content: prompt }]
                        })
                    });
                    const data = await response.json();
                    return data.choices[0].message.content;
                } catch (e) {
                    return "خطأ: تأكد من مفتاح API والإنترنت.";
                }
            },

            async handleChat() {
                const input = document.getElementById('chat-input');
                const container = document.getElementById('chat-container');
                const msg = input.value.trim();
                if(!msg) return;

                container.innerHTML += `<div class="user-msg msg-box">${msg}</div>`;
                input.value = '';
                container.scrollTop = container.scrollHeight;

                const btn = document.getElementById('btn-send-chat');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                
                const reply = await this.callAI(msg, "أنت مساعد ذكي لمعاذ. أجب باختصار.");
                container.innerHTML += `<div class="ai-msg msg-box">${reply}</div>`;
                container.scrollTop = container.scrollHeight;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i>';
            },

            async handleCodeModify() {
                const prompt = document.getElementById('ai-prompt-code').value.trim();
                const editor = document.getElementById('code-area');
                if(!prompt) return;

                const btn = document.getElementById('btn-ai-modify');
                btn.innerText = "...";
                
                const result = await this.callAI(`الكود:\n${editor.value}\n\nالمطلوب: ${prompt}`, "أرجع الكود المحدث بالكامل فقط داخل ```html.");
                const code = result.match(/```html?([\s\S]*?)```/);
                
                if(code) {
                    editor.value = code[1].trim();
                    alert("تم تحديث الكود في المحرر.");
                } else {
                    alert("تعذر استخراج كود.");
                }
                btn.innerText = "توليد";
            },

            applyCode() {
                const code = document.getElementById('code-area').value;
                if(confirm("تثبيت الكود؟")) {
                    document.open();
                    document.write(code);
                    document.close();
                }
            },

            copyCode() {
                const el = document.getElementById('code-area');
                el.select();
                document.execCommand('copy');
                alert("تم النسخ!");
            },

            saveSettings() {
                localStorage.setItem('muaad_key', document.getElementById('api-key-val').value);
                alert("تم الحفظ!");
            },

            loadSettings() {
                const key = localStorage.getItem('muaad_key');
                if(key) document.getElementById('api-key-val').value = key;
            }
        };

        System.init();
    </script>
</body>
</html>
