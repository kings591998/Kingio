<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUAAD KERNEL V5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Cairo:wght@400;700&display=swap');
        
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --border-color: #003b00;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Fira Code', 'Cairo', monospace;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .terminal-border {
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }

        .header-bar {
            font-size: 10px;
            padding: 5px 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            background: rgba(0, 20, 0, 0.8);
        }

        #output-stream {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            font-size: 12px;
            line-height: 1.5;
            background: radial-gradient(circle, #001a00 0%, #0a0a0a 100%);
        }

        .input-area {
            background: #000;
            border-top: 1px solid var(--neon-green);
            padding: 10px;
            display: flex;
            gap: 10px;
        }

        input {
            background: transparent;
            border: none;
            color: var(--neon-green);
            flex: 1;
            outline: none;
            font-family: 'Fira Code', monospace;
        }

        .btn-execute {
            background: var(--neon-green);
            color: black;
            font-weight: bold;
            padding: 5px 15px;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            font-size: 12px;
        }

        .btn-execute:hover {
            background: #fff;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .msg-node { margin-bottom: 15px; border-right: 1px solid var(--border-color); padding-right: 10px; }
        .label { font-weight: bold; color: #fff; margin-left: 5px; }
        
        /* Scanline effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header-bar">
        <span>[MODEL: OPENROUTER_AI_GEMINI]</span>
        <span>[ENCRYPTION: AES-256]</span>
        <span id="clock">00:00:00</span>
        <span style="color: #fff;">CORE: ONLINE</span>
    </div>

    <!-- Main Shell -->
    <div id="output-stream">
        <div class="msg-node">
            <span class="label">[SYSTEM]:</span> Booting AI Shell... Done.
            <br>
            <span class="label">[AUTH]:</span> User MUAAD recognized. API Key Loaded.
        </div>
    </div>

    <!-- Input Box -->
    <div class="input-area">
        <button class="btn-execute" onclick="System.execute()">EXECUTE</button>
        <input type="text" id="terminal-input" placeholder="اسأل الذكاء الاصطناعي أو أدخل كوداً برمجياً هنا ..." autocomplete="off">
    </div>

    <!-- Navigation (Hidden for pure look, access via commands or small buttons) -->
    <div class="flex justify-around bg-black text-[10px] py-1 border-t border-green-900">
        <button onclick="System.switchView('chat')">SHELL</button>
        <button onclick="System.switchView('editor')">KERNEL_EDIT</button>
        <button onclick="System.switchView('settings')">CONFIG</button>
    </div>

    <script>
        const API_KEY = "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";

        const System = {
            async execute() {
                const input = document.getElementById('terminal-input');
                const val = input.value.trim();
                if(!val) return;

                this.log(`> ${val}`, 'USER');
                input.value = '';

                // الربط الحقيقي بـ OpenRouter
                try {
                    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${API_KEY}`,
                            "Content-Type": "application/json",
                            "HTTP-Referer": "https://muaad-system.github.io", 
                            "X-Title": "Muaad System"
                        },
                        body: JSON.stringify({
                            model: "google/gemini-2.0-flash-001",
                            messages: [
                                {role: "system", content: "أنت نظام ذكاء اصطناعي مدمج في نواة نظام هكر. اسم المستخدم هو معاذ. أجب باختصار وبطريقة تقنية."},
                                {role: "user", content: val}
                            ]
                        })
                    });

                    const data = await response.json();
                    if (data.choices && data.choices[0]) {
                        this.log(data.choices[0].message.content, 'AI');
                    } else {
                        this.log("ERROR: API Response invalid. Check credits.", 'SYS');
                    }
                } catch (err) {
                    this.log(`CRITICAL_ERROR: ${err.message}`, 'SYS');
                }
            },

            log(text, sender) {
                const stream = document.getElementById('output-stream');
                const node = document.createElement('div');
                node.className = 'msg-node';
                const label = sender === 'AI' ? '[AI_RESPONSE]' : (sender === 'USER' ? '[MUAAD]' : '[SYSTEM]');
                node.innerHTML = `<span class="label">${label}:</span> ${text}`;
                stream.appendChild(node);
                stream.scrollTop = stream.scrollHeight;
            },

            updateClock() {
                const now = new Date();
                document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
            },

            switchView(view) {
                this.log(`Switching to ${view} mode...`, 'SYS');
                // هنا يمكن إضافة منطق تبديل المحرر أو الإعدادات بنفس التصميم
            }
        };

        // Initialize
        setInterval(() => System.updateClock(), 1000);
        document.getElementById('terminal-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') System.execute();
        });
    </script>
</body>
</html>
