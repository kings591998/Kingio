<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوج | لوحة التحكم السيادية</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body { background: #0A0B10; color: #eee; direction: rtl; padding: 1.5rem; }
        .container { max-width: 1400px; margin: auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid #2a2a35; padding-bottom: 1rem; }
        .logo { font-size: 2rem; color: #D4AF37; font-weight: bold; }
        .stats-badge { background: #1e1e2a; padding: 0.4rem 1rem; border-radius: 40px; font-size: 0.8rem; }
        .grid-2col { display: grid; grid-template-columns: repeat(2,1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .card { background: #0C0F17; border: 1px solid #2a2a35; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .card h2 { color: #D4AF37; margin-bottom: 1rem; border-right: 3px solid #D4AF37; padding-right: 0.8rem; }
        .flex-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
        input, select, textarea { background: #1a1c25; border: 1px solid #2a2a35; padding: 0.7rem 1rem; border-radius: 1rem; color: white; width: 100%; margin-bottom: 0.8rem; }
        button { background: #D4AF37; color: #000; border: none; padding: 0.6rem 1.2rem; border-radius: 2rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.85; transform: scale(0.98); }
        .btn-outline { background: transparent; border: 1px solid #D4AF37; color: #D4AF37; }
        .block {
            background: #12141E;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; cursor: move; }
        .delete-block { background: none; border: none; color: #ff7777; font-size: 1.2rem; cursor: pointer; }
        .image-preview { max-width: 100%; max-height: 180px; margin-top: 0.5rem; border-radius: 0.8rem; }
        .code-preview { background: #0D0F14; padding: 0.8rem; border-radius: 0.8rem; margin-top: 0.5rem; }
        .message { padding: 0.8rem; border-radius: 1rem; margin-top: 1rem; text-align: center; display: none; }
        .success { background: #1e4620; display: block; }
        .error { background: #8b2c2c; display: block; }
        .sub-item { background: #2a2a35; display: inline-block; padding: 0.2rem 0.8rem; border-radius: 40px; margin-left: 0.5rem; margin-bottom: 0.3rem; }
        @media (max-width: 800px) { .grid-2col { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <!-- لوحة تسجيل الدخول -->
    <div id="loginPanel" class="card" style="max-width: 500px; margin: 5rem auto;">
        <h2>🔐 دخول الإدارة</h2>
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="loginPassword" placeholder="كلمة المرور">
        <button id="doLoginBtn">تسجيل الدخول</button>
        <div id="loginMsg" class="message"></div>
    </div>

    <!-- لوحة الإدارة (تظهر بعد تسجيل الدخول) -->
    <div id="adminPanel" style="display: none;">
        <div class="admin-header">
            <div class="logo">AWJ Admin</div>
            <div><span class="stats-badge" id="statsInfo"></span> <button id="logoutBtn" style="background:#333; color:#eee;">تسجيل الخروج</button></div>
        </div>

        <div class="grid-2col">
            <!-- إدارة التبويبات والفروع -->
            <div class="card">
                <h2><i class="fas fa-folder-tree"></i> التبويبات والفروع</h2>
                <div class="flex-row"><input type="text" id="newCatName" placeholder="اسم التبويبة الجديدة"><button id="addCatBtn">➕ إضافة تبويبة</button></div>
                <div id="catsList"></div>
            </div>
            <!-- إدارة الكتّاب -->
            <div class="card">
                <h2><i class="fas fa-users"></i> الكتّاب</h2>
                <div class="flex-row"><input type="text" id="newAuthorName" placeholder="اسم الكاتب الجديد"><button id="addAuthorBtn">➕ إضافة كاتب</button></div>
                <div id="authorsList"></div>
            </div>
        </div>

        <!-- محرر المقال المتقدم (كتل) -->
        <div class="card">
            <h2><i class="fas fa-feather-alt"></i> محرر المقال المتقدم</h2>
            <input type="text" id="articleTitle" placeholder="عنوان المقال">
            <select id="authorSelect"></select>
            <div class="flex-row">
                <select id="catSelect" style="flex:1"></select>
                <select id="subSelect" style="flex:1"></select>
            </div>
            <div id="blocksEditor"></div>
            <div class="flex-row">
                <button id="addTextBtn"><i class="fas fa-paragraph"></i> نص (HTML)</button>
                <button id="addImageBtn"><i class="fas fa-image"></i> صورة</button>
                <button id="addCodeBtn"><i class="fas fa-code"></i> كود</button>
                <button id="addSummaryBtn"><i class="fas fa-lightbulb"></i> مختصر</button>
            </div>
            <hr style="margin: 1rem 0; border-color:#2a2a35;">
            <button id="publishBtn" style="width:100%;">🚀 نشر المقال</button>
            <div id="publishMsg" class="message"></div>
        </div>
    </div>
</div>

<script>
    // ==================== إعدادات Firebase ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDjgVxvtPXTn1tpr4IxOK3wOW4r3gzB1VU",
        authDomain: "awj-website-29f16.firebaseapp.com",
        projectId: "awj-website-29f16",
        storageBucket: "awj-website-29f16.firebasestorage.app",
        messagingSenderId: "406747568578",
        appId: "1:406747568578:web:741821d3c60df0011b5e5b",
        measurementId: "G-DFB0GYH7LN"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const storage = firebase.storage();

    let categories = [];
    let authors = [];
    let blocks = [];
    const languages = ["javascript","python","html","css","php","java","csharp","go","ruby","bash","typescript","swift","kotlin"];

    // ==================== المصادقة ====================
    document.getElementById('doLoginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        try { await auth.signInWithEmailAndPassword(email, pass); } 
        catch(e) { showMsg('loginMsg', '❌ '+e.message, 'error'); }
    };
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadCategories(); loadAuthors(); loadBlocksFromLocal();
            updateStats();
        } else {
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
        }
    });
    document.getElementById('logoutBtn').onclick = () => auth.signOut();
    function showMsg(elId, text, type) { const d = document.getElementById(elId); d.innerHTML = text; d.className = `message ${type}`; setTimeout(() => d.className = 'message', 3000); }
    async function updateStats() { const snap = await db.collection('articles').get(); document.getElementById('statsInfo').innerHTML = `📄 ${snap.size} مقال | ✍️ ${authors.length} كاتب | 🗂️ ${categories.length} تبويبة`; }

    // ==================== إدارة التبويبات ====================
    async function loadCategories() {
        const snap = await db.collection('categories').orderBy('name').get();
        categories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderCatsList(); updateCatSelects();
    }
    function renderCatsList() {
        const div = document.getElementById('catsList');
        if (!categories.length) { div.innerHTML = '<p>لا توجد تبويبات</p>'; return; }
        div.innerHTML = '';
        categories.forEach(cat => {
            div.innerHTML += `
                <div style="background:#12141E; border-radius:1rem; padding:0.8rem; margin-bottom:0.8rem;">
                    <div class="flex-row" style="justify-content:space-between;"><b>📁 ${escapeHtml(cat.name)}</b> <button class="btn-outline" onclick="deleteCat('${cat.id}')">حذف</button></div>
                    <div>${cat.subfields.map(s => `<span class="sub-item">${escapeHtml(s)} <i class="fas fa-times-circle" style="cursor:pointer;" onclick="removeSub('${cat.id}','${s}')"></i></span>`).join('')}</div>
                    <div class="flex-row"><input type="text" id="sub-${cat.id}" placeholder="فرع جديد"><button class="btn-outline" onclick="addSub('${cat.id}')">إضافة فرع</button></div>
                </div>
            `;
        });
    }
    window.deleteCat = async (id) => { if(confirm('سيتم حذف التبويبة وجميع فروعها')) { await db.collection('categories').doc(id).delete(); loadCategories(); } };
    window.addSub = async (catId) => {
        const input = document.getElementById(`sub-${catId}`);
        const val = input.value.trim();
        if(!val) return;
        const cat = categories.find(c=>c.id===catId);
        const newSubs = [...cat.subfields, val];
        await db.collection('categories').doc(catId).update({ subfields: newSubs });
        input.value = '';
        loadCategories();
    };
    window.removeSub = async (catId, subName) => {
        const cat = categories.find(c=>c.id===catId);
        const newSubs = cat.subfields.filter(s=>s!==subName);
        await db.collection('categories').doc(catId).update({ subfields: newSubs });
        loadCategories();
    };
    document.getElementById('addCatBtn').onclick = async () => {
        const name = document.getElementById('newCatName').value.trim();
        if(!name) return;
        await db.collection('categories').add({ name, subfields: [] });
        document.getElementById('newCatName').value = '';
        loadCategories();
    };
    function updateCatSelects() {
        const catSel = document.getElementById('catSelect');
        const subSel = document.getElementById('subSelect');
        catSel.innerHTML = '<option value="">اختر التبويبة</option>';
        categories.forEach(c => catSel.innerHTML += `<option value="${c.name}">${c.name}</option>`);
        catSel.onchange = () => {
            const catName = catSel.value;
            const cat = categories.find(c=>c.name===catName);
            subSel.innerHTML = '<option value="">اختر الفرع</option>';
            if(cat) cat.subfields.forEach(s => subSel.innerHTML += `<option value="${s}">${s}</option>`);
        };
    }

    // ==================== إدارة الكتّاب ====================
    async function loadAuthors() {
        const snap = await db.collection('authors').orderBy('name').get();
        authors = snap.docs.map(d => ({ id: d.id, name: d.data().name }));
        renderAuthorsList(); updateAuthorSelect(); updateStats();
    }
    function renderAuthorsList() {
        const div = document.getElementById('authorsList');
        if(!authors.length) { div.innerHTML = '<p>لا يوجد كتاب</p>'; return; }
        div.innerHTML = authors.map(a => `<div class="flex-row" style="justify-content:space-between;"><span>✍️ ${escapeHtml(a.name)}</span><button class="btn-outline" onclick="deleteAuthor('${a.id}')">حذف</button></div>`).join('');
    }
    window.deleteAuthor = async (id) => { await db.collection('authors').doc(id).delete(); loadAuthors(); };
    document.getElementById('addAuthorBtn').onclick = async () => {
        const name = document.getElementById('newAuthorName').value.trim();
        if(!name) return;
        await db.collection('authors').add({ name });
        document.getElementById('newAuthorName').value = '';
        loadAuthors();
    };
    function updateAuthorSelect() { 
        const sel = document.getElementById('authorSelect');
        sel.innerHTML = '<option value="">اختر الكاتب</option>';
        authors.forEach(a => sel.innerHTML += `<option value="${a.name}">${a.name}</option>`);
    }

    // ==================== محرر الكتل (المنشئ المتقدم) ====================
    function addBlock(type) {
        if(type === 'text') blocks.push({ type, value: '<p>نص جديد <strong>غامق</strong> أو <em>مائل</em></p>' });
        else if(type === 'image') blocks.push({ type, value: { url: '', caption: '' } });
        else if(type === 'code') blocks.push({ type, value: { code: '// اكتب كودك', language: 'javascript' } });
        else if(type === 'summary') blocks.push({ type, value: 'ملخص المقال هنا...' });
        renderBlocks(); saveBlocksToLocal();
    }
    function deleteBlock(idx) { blocks.splice(idx,1); renderBlocks(); saveBlocksToLocal(); }
    function updateBlockValue(idx, field, val) {
        if(typeof blocks[idx].value === 'string') blocks[idx].value = val;
        else blocks[idx].value[field] = val;
        saveBlocksToLocal();
        renderBlocks(); // إعادة العرض لتحديث المعاينة
    }
    async function uploadImage(idx, fileInput) {
        const file = fileInput.files[0];
        if(!file) return;
        const ref = storage.ref(`articles/${Date.now()}_${file.name}`);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        blocks[idx].value.url = url;
        saveBlocksToLocal();
        renderBlocks();
    }
    function renderBlocks() {
        const container = document.getElementById('blocksEditor');
        if(!blocks.length) { container.innerHTML = '<div style="text-align:center; color:#aaa;">➕ أضف كتلة جديدة باستخدام الأزرار أعلاه</div>'; return; }
        container.innerHTML = '';
        blocks.forEach((block, idx) => {
            const div = document.createElement('div');
            div.className = 'block';
            div.setAttribute('data-idx', idx);
            let inner = `<div class="block-header"><span>${block.type==='text'?'📝 نص':block.type==='image'?'🖼️ صورة':block.type==='code'?'💻 كود':'✨ مختصر'}</span><button class="delete-block" onclick="deleteBlock(${idx})"><i class="fas fa-trash"></i></button></div>`;
            if(block.type === 'text') inner += `<textarea rows="4" onchange="updateBlockValue(${idx}, null, this.value)">${escapeHtml(block.value)}</textarea>`;
            else if(block.type === 'image') {
                inner += `<input type="file" accept="image/*" onchange="uploadImage(${idx}, this)">`;
                if(block.value.url) inner += `<div><img src="${block.value.url}" class="image-preview"><br><input type="text" placeholder="التسمية" value="${escapeHtml(block.value.caption)}" onchange="updateBlockValue(${idx},'caption',this.value)"></div>`;
            }
            else if(block.type === 'code') {
                inner += `<select onchange="updateBlockValue(${idx}, 'language', this.value)">${languages.map(l=>`<option value="${l}" ${block.value.language===l?'selected':''}>${l}</option>`).join('')}</select>`;
                inner += `<textarea rows="6" onchange="updateBlockValue(${idx}, 'code', this.value)">${escapeHtml(block.value.code)}</textarea>`;
                inner += `<div class="code-preview"><pre><code class="language-${block.value.language}">${escapeHtml(block.value.code)}</code></pre></div>`;
            }
            else if(block.type === 'summary') inner += `<textarea rows="3" onchange="updateBlockValue(${idx}, null, this.value)">${escapeHtml(block.value)}</textarea>`;
            div.innerHTML = inner;
            container.appendChild(div);
            if(block.type === 'code') {
                const codeBlock = div.querySelector('pre code');
                if(codeBlock) hljs.highlightElement(codeBlock);
            }
        });
        new Sortable(container, { animation: 200, onEnd: () => { syncBlocksOrder(); } });
    }
    function syncBlocksOrder() {
        const newBlocks = [];
        document.querySelectorAll('.block').forEach(el => {
            const idx = parseInt(el.getAttribute('data-idx'));
            newBlocks.push(blocks[idx]);
        });
        blocks = newBlocks;
        saveBlocksToLocal();
        renderBlocks();
    }
    function saveBlocksToLocal() { localStorage.setItem('admin_blocks', JSON.stringify(blocks)); }
    function loadBlocksFromLocal() { const saved = localStorage.getItem('admin_blocks'); if(saved) blocks = JSON.parse(saved); else blocks = []; renderBlocks(); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    // ==================== نشر المقال ====================
    document.getElementById('publishBtn').onclick = async () => {
        const title = document.getElementById('articleTitle').value.trim();
        const author = document.getElementById('authorSelect').value;
        const cat = document.getElementById('catSelect').value;
        const sub = document.getElementById('subSelect').value;
        if(!title || !author || !cat || !sub || blocks.length===0) {
            showMsg('publishMsg','❌ جميع الحقول مطلوبة وكتلة واحدة على الأقل','error'); return;
        }
        const cleanBlocks = blocks.map(b => {
            if(b.type === 'image') return { type:'image', value:{ url:b.value.url, caption:b.value.caption } };
            return b;
        });
        try {
            await db.collection('articles').add({
                title, author, category: cat, subfield: sub,
                contentBlocks: cleanBlocks, views: 0,
                date: firebase.firestore.FieldValue.serverTimestamp()
            });
            showMsg('publishMsg','✅ نشر المقال بنجاح','success');
            blocks = []; localStorage.removeItem('admin_blocks');
            document.getElementById('articleTitle').value = '';
            renderBlocks();
        } catch(e) { showMsg('publishMsg','❌ '+e.message,'error'); }
    };
    document.getElementById('addTextBtn').onclick = () => addBlock('text');
    document.getElementById('addImageBtn').onclick = () => addBlock('image');
    document.getElementById('addCodeBtn').onclick = () => addBlock('code');
    document.getElementById('addSummaryBtn').onclick = () => addBlock('summary');
</script>
</body>
</html>
